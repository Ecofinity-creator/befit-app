function setAdminDate(email,d){
  if(!S.adminDates)S.adminDates={};
  S.adminDates[email]=d;
  // Load data for this date from Firestore
  var keys=['diary:'+email+':'+d,'feedback:'+email+':'+d,'analyse_day:'+email+':'+d];
  ['morning','lunch','evening'].forEach(function(k){keys.push('analyse:'+email+':'+d+':'+k);});
  Promise.all(keys.map(function(k){
    return fsdb.collection('data').doc(fsKey(k)).get().then(function(snap){
      if(snap.exists)localStorage.setItem(k,snap.data().v);
    }).catch(function(){});
  })).then(function(){render();});
}
function saveGoals(email,goals){DB.set('goals:'+email,goals);loadAdminClients();showToast('\u2713 Doelstellingen opgeslagen');render();}
function getWellbeing(email,dateStr){return DB.get('wellbeing:'+(email||S.user.email)+':'+(dateStr||today()))||{};}
function saveWellbeing(field,val){
  var key='wellbeing:'+S.user.email+':'+today();
  var ex=DB.get(key)||{};
  ex[field]=val;ex.ts=Date.now();
  DB.set(key,ex);
  showToast('\u2713 Opgeslagen');
  render();
}

function getTopItems(meal,n){
  var counts={};
  DB.keys().filter(function(k){return k.startsWith('diary:'+S.user.email+':');}).forEach(function(k){
    var d=DB.get(k);if(!d||!d.meals||!d.meals[meal])return;
    d.meals[meal].forEach(function(it){counts[it.t]=(counts[it.t]||0)+1;});
  });
  return Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,n||5);
}

async function syncAllFromFirestore(){
  try{
    var snap=await fsdb.collection('data').get();
    var count=0;
    snap.forEach(function(doc){
      try{
        var k=fromFsKey(doc.id);
        if(doc.data()&&doc.data().v){
          localStorage.setItem(k,doc.data().v);
          count++;
        }
      }catch(e){console.warn('Error storing doc',doc.id,e);}
    });
    console.log('Synced',count,'of',snap.size,'docs from Firestore');
  }catch(e){
    console.warn('syncAllFromFirestore failed:',e.message);
    // Fallback: try to get just user docs with a prefix query
    try{
      var userSnap=await fsdb.collection('data')
        .orderBy('__name__')
        .startAt('user__at__')
        .endAt('user__at__\uf8ff')
        .get();
      userSnap.forEach(function(doc){
        try{if(doc.data()&&doc.data().v)localStorage.setItem(fromFsKey(doc.id),doc.data().v);}catch(e){}
      });
      console.log('Fallback synced',userSnap.size,'user docs');
    }catch(e2){console.warn('Fallback also failed:',e2.message);}
  }
}

    try{

      var current=DB.get(key)||{msgs:[]};
      // Alleen bijwerken als er nieuwe berichten zijn
      if(data.msgs&&data.msgs.length!==(current.msgs||[]).length){

function doLogin(){
  var email = (document.getElementById('li-email').value||'').trim().toLowerCase();
  var pass = document.getElementById('li-pass').value||'';
  var err = document.getElementById('li-err');
  if(!err) return;
  err.classList.remove('show');

  if(!email||!pass){
    err.textContent='Vul je e-mail en wachtwoord in.';
    err.classList.add('show');
    return;
  }

  // Check superuser
  if(email===SYSTEM_ADMIN && pass===SYSTEM_PASS){
    S.user={email:email,name:'Ecofinity Support',isAdmin:true};
    S.screen='admin';S.adminTab='clients';
    loadAdminClients();render();
    syncAllFromFirestore().then(function(){loadAdminClients();render();}).catch(function(){});
    try{loadAdminClientsFromFirestore();}catch(e){}
    try{startAdminSync();}catch(e){}
    return;
  }

  // Check other admins
  var adm = findAdmin(email);
  if(adm){
    var sp = getAdminPass(email);
    if(sp && (pass===sp || btoa(pass)===sp)){
      S.user={email:email,name:adm.name,isAdmin:true};
      S.screen='admin';S.adminTab='clients';
      loadAdminClients();render();
      syncAllFromFirestore().then(function(){loadAdminClients();render();}).catch(function(){});

      try{startAdminSync();}catch(e){}
      return;
    }
    err.textContent='Wachtwoord onjuist.';
    err.classList.add('show');
    return;
  }

  // Client login - check localStorage first, then Firestore
  err.textContent='Even geduld…';
  err.classList.add('show');

  function tryLogin(){
    var ud = DB.get('user:'+email);
    if(!ud){
      err.textContent='E-mailadres niet gevonden.';
      err.classList.add('show');
      return;
    }
    if(ud.pass !== btoa(pass)){
      err.textContent='Wachtwoord onjuist.';
      err.classList.add('show');
      return;
    }
    if(ud.status==='pending'){
      err.textContent='Je aanmelding wacht nog op goedkeuring.';
      err.classList.add('show');
      return;
    }
    if(ud.status==='rejected'){
      err.textContent='Je aanmelding werd niet goedgekeurd.';
      err.classList.add('show');
      return;
    }
    err.classList.remove('show');
    S.user={email:email,name:ud.name,isAdmin:false};
    S.mealDate=null;
    localStorage.removeItem('diary:'+email+':'+today());
    S.meals={morning:[],lunch:[],evening:[]};
    S.snacks={morning:[],lunch:[],evening:[]};
    S.water=0;S.reminders=[];

    saveSession();if(S._startTab){S.tab=S._startTab;}if(S._startSection==='snack'&&S._startTab){  setTimeout(function(){    var el=document.getElementById('snack-in-'+S._startTab);    if(el){el.scrollIntoView({behavior:'smooth'});el.focus();}    S._startSection=null;  },600);}startReminderCheck();checkMissedSnackPushes();scheduleDailyReminder();render();requestNotifPermission();setTimeout(startStepCounting,1500);
    syncFromFirestore(email).then(function(){loadUserData();render();}).catch(function(){});
    startDiarySync(email);
  }

  // Try Firestore first, then fallback to localStorage
  fsdb.collection('data').doc(fsKey('user:'+email)).get()
    .then(function(snap){
      if(snap.exists && snap.data() && snap.data().v){
        localStorage.setItem('user:'+email, snap.data().v);
      }
      tryLogin();
    })
    .catch(function(){
      tryLogin();
    });
}

  var email=document.getElementById('fg-email').value.trim().toLowerCase();
  var err=document.getElementById('fg-err');
  err.classList.remove('show');
  if(!email){err.textContent='Vul je e-mailadres in.';err.classList.add('show');return;}
  var isAdmin=!!findAdmin(email);
  if(isAdmin){
    // Admin: use local password change
    S._forgotEmail=email;S._forgotIsAdmin=true;S.screen='changepass';render();return;
  }
  // Client: send Firebase password reset email
  err.textContent='Even geduld\u2026';err.classList.add('show');
  try{
    await fsauth.sendPasswordResetEmail(email);
    err.classList.remove('show');
    var ok=document.getElementById('fg-ok');
    if(ok){ok.textContent='\u2713 Resetlink verstuurd naar '+email+'. Controleer je inbox (en spam).';ok.classList.add('show');}
    else{alert('Resetlink verstuurd naar '+email);}
    setTimeout(function(){S.screen='login';render();},3500);
  }catch(e){
    err.classList.remove('show');
    var msg=e.code==='auth/user-not-found'?'E-mailadres niet gevonden.'
      :'Kon geen resetlink sturen: '+e.message;
    err.textContent=msg;err.classList.add('show');
  }
}

function getWaterStreak(){
  var streak=0;
  var d=new Date();
  for(var i=1;i<=30;i++){
    d.setDate(d.getDate()-1);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+S.user.email+':'+ds);
    var goal=DB.get('wgoal:'+S.user.email)||8;
    if(diary&&(diary.water||0)>=goal) streak++;
    else break;
  }
  // Check today
  if(S.water>=(S.wgoal||8)) streak++;
  return streak;
}

function getComplianceScore(email){
  var filled=0;
  for(var i=0;i<7;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+email+':'+ds);
    if(diary){
      var meals=diary.meals||{};
      if((meals.morning&&meals.morning.length)||(meals.lunch&&meals.lunch.length)||(meals.evening&&meals.evening.length))filled++;
    }
  }
  return Math.round(filled/7*100);
}
function getDaysInactive(email){
  for(var i=0;i<14;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+email+':'+ds);
    if(diary){
      var meals=diary.meals||{};
      if((meals.morning&&meals.morning.length)||(meals.lunch&&meals.lunch.length)||(meals.evening&&meals.evening.length))return i;
    }
  }
  return 14;
}

function renderAnalyseResult(data){
  var macros=[
    {label:'Kcal',val:data.kcal,unit:'kcal',color:'#C9A84C',icon:'&#x1F525;'},
    {label:'Prote\u00efnen',val:data.proteinen,unit:'g',color:'#2A6030',icon:'&#x1F4AA;'},
    {label:'Koolhydraten',val:data.koolhydraten,unit:'g',color:'#3A8FBD',icon:'&#x1F33E;'},
    {label:'Vetten',val:data.vetten,unit:'g',color:'#C0392B',icon:'&#x1F9C8;'},
    {label:'Vezels',val:data.vezels,unit:'g',color:'#4A8E7B',icon:'&#x1F343;'},
    {label:'Suikers',val:data.suikers,unit:'g',color:'#E67E22',icon:'&#x1F36C;'},
  ];
  var macroGrid=macros.map(function(m){
    return '<div style="text-align:center;padding:10px 6px;background:#FDFAF5;border-radius:10px;border:1px solid #EAE2D0;">'
      +'<div style="font-size:18px;margin-bottom:4px;">'+m.icon+'</div>'
      +'<div style="font-size:16px;font-weight:800;color:'+m.color+';">'+m.val+'</div>'
      +'<div style="font-size:10px;color:#9E9580;">'+m.unit+'</div>'
      +'<div style="font-size:9px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;">'+m.label+'</div>'
      +'</div>';
  }).join('');

  var scoreColor=data.score>=8?'#2A6030':data.score>=5?'#C9A84C':'#C0392B';
  var scoreLabel=data.score>=8?'Uitstekend!':data.score>=6?'Goed':data.score>=4?'Matig':'Te verbeteren';

  var html='<div style="border-top:1px solid #EAE2D0;padding-top:14px;">'
    // Detected dishes from photo
    +(data.fromPhoto&&data.gerechten&&data.gerechten.length
      ?'<div style="background:#EAF4F2;border-radius:10px;padding:10px 12px;margin-bottom:12px;">'
      +'<div style="font-size:10px;font-weight:700;color:#2A6030;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">&#x1F4F7; Herkende gerechten</div>'
      +data.gerechten.map(function(g){return '<div style="font-size:12px;color:#1E3D20;padding:2px 0;">&#x2022; '+g+'</div>';}).join('')
      +'</div>':'')
    // Score
    +'<div style="display:flex;align-items:center;gap:12px;background:#F0F7F2;border-radius:12px;padding:12px 16px;margin-bottom:14px;">'
    +'<div style="text-align:center;">'
    +'<div style="font-size:32px;font-weight:800;color:'+scoreColor+';">'+data.score+'</div>'
    +'<div style="font-size:9px;font-weight:700;color:#5A7A5C;text-transform:uppercase;">/10</div>'
    +'</div>'
    +'<div><div style="font-size:15px;font-weight:700;color:'+scoreColor+';">'+scoreLabel+'</div>'
    +'<div style="font-size:12px;color:#5A7A5C;margin-top:2px;">'+data.scoreUitleg+'</div>'
    +'</div></div>'
    // Macro grid
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">'+macroGrid+'</div>'
    // Tips
    +(data.tips&&data.tips.length?
      '<div style="background:#FFFBEF;border-radius:10px;padding:12px;margin-bottom:10px;">'
      +'<div style="font-size:11px;font-weight:700;color:#856404;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">&#x1F4A1; Tips van de AI</div>'
      +data.tips.map(function(t){
        return '<div style="font-size:12px;color:#5A5020;padding:4px 0;border-bottom:1px solid #F5EED5;">&#x2022; '+t+'</div>';
      }).join('')
      +'</div>':'')
    // Disclaimer
    +'<div style="font-size:10px;color:#9E9580;text-align:center;font-style:italic;padding-top:6px;">'
    +'Analyse is een schatting op basis van de omschrijving. Raadpleeg je di\u00ebtiste voor persoonlijk advies.'
    +'</div>'
    +'</div>';
  return html;
}

async function runPhotoAnalyse(input){
  var file=input.files&&input.files[0];
  if(!file){return;}
  // Read as base64
  var reader=new FileReader();
  reader.onload=async function(e){
    var dataUrl=e.target.result;
    var base64=dataUrl.split(',')[1];
    var mediaType=file.type||'image/jpeg';
    S.photoPreview=dataUrl;
    S.analyseLoading=true;
    render();
    try{
      var selDate=getSummaryDate();
      var resp=await callClaude({
          model:'claude-sonnet-4-6',
          max_tokens:600,
          system:'Je bent een voedingsdeskundige assistent. Analyseer maaltijdfoto\'s nauwkeurig. Antwoord altijd in het Nederlands en enkel in het gevraagde JSON-formaat.',
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Analyseer deze maaltijdfoto en geef een schatting van de voedingswaarden. '
              +'Identificeer alle zichtbare voedingsmiddelen en bereken de totale voedingswaarden. '
              +'Antwoord ENKEL in dit JSON-formaat:\n'
              +'{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"korte uitleg","gerechten":["gerecht1","gerecht2"],"tips":["tip1","tip2","tip3"]}'}
          ]}]
        });
      var data=await resp.json();
      var text=data.content[0].text.replace(/```json|```/g,'').trim();
      var result=JSON.parse(text);
      result.fromPhoto=true;
      DB.set('analyse:'+S.user.email+':'+selDate,result);
      savePhotoToArchive(dataUrl,result.samenvatting||'',S.tab,selDate);
    }catch(err){
      showToast('Foto-analyse mislukt. Probeer opnieuw.');
      S.photoPreview=null;
    }
    S.analyseLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}
async function runAnalyse(){
  var selDate=getSummaryDate(),isToday=selDate===today();
  var diary=isToday
    ?{meals:S.meals,snacks:S.snacks}
    :DB.get('diary:'+S.user.email+':'+selDate)||{meals:{morning:[],lunch:[],evening:[]},snacks:{morning:[],lunch:[],evening:[]}};
  var dm=diary.meals||{morning:[],lunch:[],evening:[]};
  var mealNames={morning:'Ontbijt',lunch:'Middagmaal',evening:'Avondmaal'};
  var allItems=[];
  ['morning','lunch','evening'].forEach(function(k){
    var items=dm[k]||[];
    if(items.length) items.forEach(function(i){ allItems.push(mealNames[k]+': '+i.t); });
  });
  if(!allItems.length){showToast('Geen maaltijden om te analyseren');return;}
  S.analyseLoading=true;render();
  try{
    var prompt='Analyseer deze maaltijden van een persoon die werkt aan een gezonder eetpatroon:\n\n'
      +allItems.join('\n')
      +'\n\nGeef een schatting van de voedingswaarden voor de volledige dag en geef ook tips. '
      +'Antwoord ENKEL in dit JSON-formaat, zonder uitleg erbuiten:\n'
      +'{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"korte uitleg","tips":["tip1","tip2","tip3"]}';
    var resp=await callClaude({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        system:'Je bent een voedingsdeskundige assistent. Antwoord altijd in het Nederlands en enkel in het gevraagde JSON-formaat.',
        messages:[{role:'user',content:prompt}]
      });
    var data=await resp.json();
    var text=data.content[0].text.replace(/```json|```/g,'').trim();
    var result=JSON.parse(text);
    DB.set('analyse:'+S.user.email+':'+selDate,result);
  }catch(e){
    showToast('Analyse mislukt. Probeer opnieuw.');
  }
  S.analyseLoading=false;render();
}

// ── STREAKS ──────────────────────────────────────────────────
function getStreak(email){
  var e=email||S.user.email,streak=0,d=new Date();
  for(var i=0;i<365;i++){
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+e+':'+ds);
    var ok=diary&&diary.meals&&(['morning','lunch','evening'].some(function(k){return diary.meals[k]&&diary.meals[k].length>0;}));
    if(ok){streak++;}else if(i>0){break;}
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getLongestStreak(email){
  var e=email||S.user.email,best=0,current=0,prev=null;
  var dates=DB.keys().filter(function(k){return k.startsWith('diary:'+e+':');})
    .map(function(k){return k.replace('diary:'+e+':','');})
    .filter(function(d){return /^\d{4}-\d{2}-\d{2}$/.test(d);}).sort();
  dates.forEach(function(ds){
    var diary=DB.get('diary:'+e+':'+ds);
    var ok=diary&&diary.meals&&(['morning','lunch','evening'].some(function(k){return diary.meals[k]&&diary.meals[k].length>0;}));
    if(ok){
      if(prev){var p=new Date(prev);p.setDate(p.getDate()+1);current=(p.toISOString().slice(0,10)===ds)?current+1:1;}
      else current=1;
      if(current>best)best=current;
      prev=ds;
    }else{current=0;prev=null;}
  });
  return best;
}

// ── BARCODE SCANNER ──────────────────────────────────────────
function scanBarcode(mealKey){
  if(!('BarcodeDetector' in window)){showToast('\u274C Barcode scanner niet beschikbaar');return;}
  var input=document.createElement('input');input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    showToast('\uD83D\uDD0D Scannen...');
    createImageBitmap(file).then(function(img){
      return new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128']}).detect(img);
    }).then(function(barcodes){
      if(!barcodes.length){showToast('\u274C Geen barcode gevonden');return;}
      var code=barcodes[0].rawValue;
      showToast('\uD83D\uDCE6 '+code+' opzoeken...');
      return fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json')
        .then(function(r){return r.json();})
        .then(function(data){
          if(data.status!==1||!data.product){showToast('\u274C Product niet gevonden');return;}
          var p=data.product,name=p.product_name_nl||p.product_name||'Onbekend';
          var kcal=p.nutriments&&p.nutriments['energy-kcal_100g']?Math.round(p.nutriments['energy-kcal_100g']):'';
          var inp=document.getElementById('meal-in-'+mealKey);
          if(inp){inp.value=name+(kcal?' ('+kcal+' kcal/100g)':'');inp.focus();}
          showToast('\u2713 '+name);
        });
    }).catch(function(err){showToast('\u274C '+err.message);});
  };
  input.click();
}

// ── STAPPENTELLER ─────────────────────────────────────────────
var _stepCount=0,_stepListener=null;
// Gravity low-pass filter state (Android fallback)
var _gX=0,_gY=0,_gZ=9.8,_GALPHA=0.85;
function startStepCounting(){
  if(_stepListener)return;
  if(!window.DeviceMotionEvent){
    showToast("\u274C Stappenteller niet beschikbaar op dit toestel");return;
  }
  function go(){
    var buf=[],lastStep=0;
    var THRESHOLD=2.5;  // m/s² boven lopend gemiddelde = stap
    var COOLDOWN=420;   // ms minimum tussen 2 stappen
    _gX=0;_gY=0;_gZ=9.8;
    _stepListener=function(e){
      var x,y,z;
      // 1) Pure lineaire versnelling (iOS + nieuwere Android) - geen zwaartekracht
      var la=e.acceleration;
      var hasClean=la&&la.x!=null&&la.y!=null&&la.z!=null&&
                   !(la.x===0&&la.y===0&&la.z===0);
      if(hasClean){
        x=la.x;y=la.y;z=la.z;
      } else {
        // 2) Fallback: AccelerationIncludingGravity + high-pass filter (Android)
        var ag=e.accelerationIncludingGravity;
        if(!ag||ag.x==null||ag.y==null||ag.z==null)return;
        // Low-pass filter -> gravity
        _gX=_GALPHA*_gX+(1-_GALPHA)*ag.x;
        _gY=_GALPHA*_gY+(1-_GALPHA)*ag.y;
        _gZ=_GALPHA*_gZ+(1-_GALPHA)*ag.z;
        // High-pass -> lineaire versnelling
        x=ag.x-_gX; y=ag.y-_gY; z=ag.z-_gZ;
      }
      var mag=Math.sqrt(x*x+y*y+z*z);
      buf.push(mag);if(buf.length>10)buf.shift();
      var avg=buf.reduce(function(s,v){return s+v;},0)/buf.length;
      var now=Date.now();
      // Stap = piek duidelijk boven lopend gemiddelde + minimale rustperiode
      if(mag>avg+THRESHOLD&&now-lastStep>COOLDOWN){
        _stepCount++;lastStep=now;
        var el=document.getElementById("step-count-display");
        if(el)el.textContent=_stepCount+" stappen";
        if(_stepCount%5===0&&S.user)DB.set("steps:"+S.user.email+":"+today(),_stepCount);
      }
    };
    window.addEventListener("devicemotion",_stepListener,{passive:true});
    showToast("\uD83D\uDC5F Stappenteller actief");
  }
  if(typeof DeviceMotionEvent.requestPermission==="function"){
    // iOS 13+: expliciete toestemming vereist via gebruikersactie
    DeviceMotionEvent.requestPermission().then(function(r){
      if(r==="granted")go();
      else showToast("\u274C Toestemming geweigerd voor bewegingssensor");
    }).catch(function(){go();});
  }else{
    // Android + andere browsers: geen expliciete toestemming nodig
    go();
  }
}
function stopStepCounting(){if(_stepListener){window.removeEventListener('devicemotion',_stepListener);_stepListener=null;}render();}

      :'<button onclick="startStepCounting()" style="background:#2A6030;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">\uD83D\uDC5F Start teller</button>')

// ── PULL TO REFRESH ───────────────────────────────────────────
(function(){
  var startY=0,pulling=false,threshold=80;
  var ind=null;
  document.addEventListener('touchstart',function(e){
    if(window.scrollY===0)startY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!startY)return;
    var dy=e.touches[0].clientY-startY;
    if(dy>20&&window.scrollY===0){
      pulling=true;
      if(!ind){ind=document.getElementById('ptr-indicator');}
      if(ind){ind.style.display=dy>threshold?'flex':'none';}
    }
  },{passive:true});
  document.addEventListener('touchend',function(){
    if(pulling&&ind&&ind.style.display==='flex'){
      ind.style.display='none';
      if(S.user&&!S.user.isAdmin){
        loadUserData();
        if(typeof startDiarySync==='function')startDiarySync(S.user.email);
        if(typeof startChatSync==='function')startChatSync(S.user.email);
        showToast('\u2713 Data ververst');
      } else if(S.user&&S.user.isAdmin){
        loadAdminClientsFromFirestore();
      }
    }
    startY=0;pulling=false;
    if(ind)ind.style.display='none';
  },{passive:true});
})();

(function(){
  var stored = localStorage.getItem('darkMode');
  if(stored === null) {
    // No manual preference set - follow system
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(prefersDark) setDarkMode(true);
  }
  // Listen for system changes
  if(window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      // Only auto-switch if user hasn't set a manual preference
      if(localStorage.getItem('befit:darkmode') === null) {

      }
    });
  }
})();

var _pc=null,_localStream=null,_callActive=false,_callRole=null,_callEmail=null;
var STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

function isVideoEnabled(email){var ud=DB.get('user:'+(email||S.user.email));return ud&&ud.videoEnabled===true;}
function toggleVideo(email){var ud=DB.get('user:'+email);if(!ud)return;ud.videoEnabled=!ud.videoEnabled;DB.set('user:'+email,ud);showToast(ud.videoEnabled?'Video bellen ingeschakeld':'Video bellen uitgeschakeld');loadAdminClients();render();}

function _vcKey(email){return 'videocall:'+email;}

async function startCall(clientEmail){
  // Admin starts a call to a client
  _callRole='caller';_callEmail=clientEmail;
  try{
    _localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    _pc=new RTCPeerConnection(STUN);
    _localStream.getTracks().forEach(function(t){_pc.addTrack(t,_localStream);});
    _pc.ontrack=function(e){var rv=document.getElementById('vc-remote');if(rv&&e.streams[0])rv.srcObject=e.streams[0];};
    _pc.onicecandidate=function(e){
      if(e.candidate){
        var key=_vcKey(clientEmail)+':caller_ice';
        var list=JSON.parse(localStorage.getItem(key)||'[]');
        list.push(e.candidate.toJSON());
        fsdb.collection('data').doc(fsKey(key)).set({v:JSON.stringify(list)}).catch(function(){});
      }
    };
    var offer=await _pc.createOffer();
    await _pc.setLocalDescription(offer);
    await fsdb.collection('data').doc(fsKey(_vcKey(clientEmail))).set({v:JSON.stringify({status:'calling',offer:offer,caller:S.user.email,ts:Date.now()})});
    _callActive=true;
    render();
    // Push notification to client
    var sub=DB.get('push:sub:'+clientEmail);
    if(sub)sendPushToClient(sub,'📹 Videogesprek','Je diëtiste wil je bellen. Open de app!','video');
    // Listen for answer
    var unsub=fsdb.collection('data').doc(fsKey(_vcKey(clientEmail))).onSnapshot(async function(snap){
      if(!snap.exists||!_pc)return;
      var data=JSON.parse(snap.data().v);
      if(data.status==='answered'&&data.answer&&_pc.signalingState==='have-local-offer'){
        await _pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        unsub();
      }
      if(data.status==='ended'){endCall();unsub();}
    });
    // Listen for client ICE candidates
    var unsubIce=fsdb.collection('data').doc(fsKey(_vcKey(clientEmail)+':callee_ice')).onSnapshot(async function(snap){
      if(!snap.exists||!_pc||!_pc.remoteDescription)return;
      var candidates=JSON.parse(snap.data().v||'[]');
      for(var i=0;i<candidates.length;i++){try{await _pc.addIceCandidate(new RTCIceCandidate(candidates[i]));}catch(e){}}
    });
  }catch(err){showToast('❌ Camera/microfoon fout: '+err.message);endCall();}
}

async function answerCall(){
  // Client answers the call
  _callRole='callee';
  try{
    var snap=await fsdb.collection('data').doc(fsKey(_vcKey(S.user.email))).get();
    if(!snap.exists)return;
    var data=JSON.parse(snap.data().v);
    if(data.status!=='calling')return;
    _callEmail=data.caller;
    _localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    _pc=new RTCPeerConnection(STUN);
    _localStream.getTracks().forEach(function(t){_pc.addTrack(t,_localStream);});
    _pc.ontrack=function(e){var rv=document.getElementById('vc-remote');if(rv&&e.streams[0])rv.srcObject=e.streams[0];};
    _pc.onicecandidate=function(e){
      if(e.candidate){
        var key=_vcKey(S.user.email)+':callee_ice';
        var list=JSON.parse(localStorage.getItem(key)||'[]');
        list.push(e.candidate.toJSON());
        fsdb.collection('data').doc(fsKey(key)).set({v:JSON.stringify(list)}).catch(function(){});
      }
    };
    await _pc.setRemoteDescription(new RTCSessionDescription(data.offer));
    var answer=await _pc.createAnswer();
    await _pc.setLocalDescription(answer);
    await fsdb.collection('data').doc(fsKey(_vcKey(S.user.email))).set({v:JSON.stringify({status:'answered',answer:answer,ts:Date.now()})});
    _callActive=true;
    render();
    setTimeout(function(){var lv=document.getElementById('vc-local');if(lv&&_localStream)lv.srcObject=_localStream;},100);
    // Listen for caller ICE candidates
    fsdb.collection('data').doc(fsKey(_vcKey(S.user.email)+':caller_ice')).onSnapshot(async function(snap){
      if(!snap.exists||!_pc||!_pc.remoteDescription)return;
      var candidates=JSON.parse(snap.data().v||'[]');
      for(var i=0;i<candidates.length;i++){try{await _pc.addIceCandidate(new RTCIceCandidate(candidates[i]));}catch(e){}}
    });
    // Listen for call end
    fsdb.collection('data').doc(fsKey(_vcKey(S.user.email))).onSnapshot(function(snap){
      if(!snap.exists)return;
      var d=JSON.parse(snap.data().v);
      if(d.status==='ended')endCall();
    });
  }catch(err){showToast('❌ Fout: '+err.message);endCall();}
}

function declineCall(){S.incomingCall=null;if(S.user)fsdb.collection('data').doc(fsKey('videocall:'+S.user.email)).set({v:JSON.stringify({status:'declined'})}).catch(function(){});render();}
function endCall(){
  if(_pc){_pc.close();_pc=null;}
  if(_localStream){_localStream.getTracks().forEach(function(t){t.stop();});_localStream=null;}
  if(_callEmail&&_callRole==='caller'){
    fsdb.collection('data').doc(fsKey(_vcKey(_callEmail))).set({v:JSON.stringify({status:'ended',ts:Date.now()})}).catch(function(){});
  }
  _callActive=false;_callRole=null;_callEmail=null;
  render();
}

async function fetchProductByBarcode(barcode,mealKey){
  var s=document.getElementById('barcode-status');
  try{
    if(s)s.textContent='\u23F3 Product ophalen\u2026';
    var resp=await fetch('https://world.openfoodfacts.org/api/v0/product/'+barcode+'.json');
    var data=await resp.json();
    if(data.status===1&&data.product){
      var p=data.product;
      var name=(p.product_name_nl||p.product_name||p.generic_name||'Onbekend').trim();
      var brand=p.brands?(' \u2014 '+p.brands.split(',')[0].trim()):'';
      var n=p.nutriments||{};
      var kcal=n['energy-kcal_100g']?Math.round(n['energy-kcal_100g']):null;
      var fullName=name+brand;
      closeBarcodeScanner();
      setTimeout(function(){
        var inp=document.getElementById('meal-in-'+mealKey);
        if(inp){inp.value=fullName;inp.focus();}
        showToast('\u2713 '+name+(kcal?' \u2014 '+kcal+' kcal/100g':''));
      },150);
    }else{
      if(s)s.textContent='\u274C Niet gevonden. Probeer opnieuw.';
      setTimeout(function(){if(document.getElementById('barcode-modal'))openBarcodeScanner(mealKey);},2000);
    }

// Proxy-functie: stuurt Anthropic-calls via de Vercel backend
// De echte API-sleutel zit in de Vercel environment, niet in de browser
async function callClaude(body){
  var backendUrl='https://befit-backend-teal.vercel.app';
  try{
    var resp=await fetch(backendUrl+'/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!resp.ok){
      // Fallback: probeer directe aanroep met lokale sleutel als die bestaat
      var localKey=getApiKey();
      if(localKey){
        var resp2=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true','x-api-key':localKey},
          body:JSON.stringify(body)
        });
        return resp2.json();
      }
      throw new Error('Backend niet bereikbaar ('+resp.status+')');
    }
    return resp.json();
  }catch(e){
    // Laatste fallback: directe aanroep
    var localKey=getApiKey();
    if(!localKey)throw e;
    var resp3=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true','x-api-key':localKey},
      body:JSON.stringify(body)
    });
    return resp3.json();
  }
}

function generateWeekReport(){
  var lines=[],totalKcal=0,totalWater=0,totalMov=0,days=0;
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+S.user.email+':'+ds);
    if(!diary)continue;
    days++;
    totalWater+=diary.water||0;
    var acts=(diary.activities||[]).reduce(function(s,a){return s+a.dur;},0);
    totalMov+=acts;
    var dayKcal=0;
    ['morning','lunch','evening'].forEach(function(k){
      var anl=DB.get(getMealAnalyseKey(S.user.email,ds,k));
      if(anl&&anl.kcal)dayKcal+=anl.kcal;
    });
    totalKcal+=dayKcal;
    var dLabel=d.toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'});
    var mealCount=['morning','lunch','evening'].reduce(function(s,k){return s+(diary.meals&&diary.meals[k]?diary.meals[k].length:0);},0);
    var dayLine=dLabel.toUpperCase()+'\r\n';
    dayLine+='  Maaltijditems: '+mealCount+'\r\n';
    dayLine+='  Water: '+Math.round(diary.water||0)+' glazen';
    if(acts)dayLine+='\r\n  Beweging: '+acts+' min';
    if(dayKcal)dayLine+='\r\n  Calorieen: '+dayKcal+' kcal';
    lines.push(dayLine);
  }
  var goals=getGoals(S.user.email);
  var avgKcal=days?Math.round(totalKcal/days):0;
  var avgWater=days?Math.round(totalWater/days*10)/10:0;
  var avgMov=days?Math.round(totalMov/days):0;
  var body='Beste '+S.user.name+',%0D%0A%0D%0AHier is je weekoverzicht van Be Fit Marke:%0D%0A%0D%0A';
  body+='GEMIDDELDEN DEZE WEEK%0D%0A';
  if(avgKcal)body+='\uD83D\uDD25 Calorieën: '+avgKcal+' kcal/dag'+(goals.kcal?' (doel: '+goals.kcal+')':'')+'%0D%0A';
  body+='\uD83D\uDCA7 Water: '+avgWater+' glazen/dag'+(goals.water?' (doel: '+goals.water+')':'')+'%0D%0A';
  body+='\uD83C\uDFC3 Beweging: '+avgMov+' min/dag'+(goals.movement?' (doel: '+goals.movement+')':'')+'%0D%0A%0D%0A';
  body+='DAGDETAILS%0D%0A-------------------------------%0D%0A'+lines.join('%0D%0A-------------------------------%0D%0A')+'%0D%0A%0D%0A';
  body+='Ga zo door! Tot volgende week.%0D%0ABe Fit Marke';
  var subject=encodeURIComponent('Jouw weekoverzicht Be Fit Marke');
  window.open('mailto:'+S.user.email+'?subject='+subject+'&body='+body,'_blank');
  showToast('\u2713 E-mailclient geopend');
}

async function runMealAnalyse(meal){
  if(!getApiKey()){showToast('Geen API-sleutel. Stel in via Instellingen.');return;}
  var selDate=getMealDate(),items=(S.meals[meal]||[]);
  if(!items.length){showToast('Geen items in deze maaltijd');return;}
  var mealNames={morning:'Ontbijt',lunch:'Middagmaal',evening:'Avondmaal'},mealName=mealNames[meal];
  S.analyseLoading=meal;render();
  try{
    var prompt='Analyseer deze '+mealName+':\n\n'+items.map(function(i){return '- '+i.t;}).join('\n')+'\n\nAntwoord ENKEL in dit JSON-formaat:\n{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"uitleg","tips":["tip1","tip2"]}';
    var resp=await callClaude({model:'claude-sonnet-4-6',max_tokens:400,system:'Je bent een voedingsdeskundige assistent. Antwoord in het Nederlands en enkel in het gevraagde JSON-formaat.',messages:[{role:'user',content:prompt}]});
    var data=await resp.json();
    if(data.error){showToast('API fout: '+data.error.message);S.analyseLoading=null;render();return;}
    if(!data.content||!data.content[0]){showToast('Ongeldig antwoord');S.analyseLoading=null;render();return;}
    var text=data.content[0].text.replace(/```json|```/g,'').trim();
    var jm=text.match(/\{[\s\S]*\}/);if(!jm){showToast('Onleesbaar antwoord');S.analyseLoading=null;render();return;}
    var result=JSON.parse(jm[0]);result.meal=meal;result.mealName=mealName;result.ts=Date.now();result.byClient=S.user.name;
    DB.set(getMealAnalyseKey(S.user.email,selDate,meal),result);
    // Also save combined daily analyse for easy admin access
    var _allAnl={};
    ['morning','lunch','evening'].forEach(function(_k){
      var _r=DB.get(getMealAnalyseKey(S.user.email,selDate,_k));
      if(_r)_allAnl[_k]=_r;
    });
    _allAnl[meal]=result;
    DB.set('analyse_day:'+S.user.email+':'+selDate,_allAnl);
  }catch(err){showToast('Analyse mislukt: '+(err.message||'fout'));}
  S.analyseLoading=null;render();
}

async function _runBarcodeAnalyse(barcode){

  var btn=document.getElementById('scan-again-btn');

    }
    var p=data.product;
    var name=(p.product_name_nl||p.product_name||p.generic_name||'Onbekend').trim();
    var brand=p.brands?p.brands.split(',')[0].trim():'';
    var n=p.nutriments||{};
    function nu(k){var v=n[k+'_100g'];return v!=null?Math.round(v*10)/10:null;}

function getSmartReminderDelay(meal){
  // Analyseer tijdstip van tussendoortjes de laatste 7 dagen
  if(!S.user)return 9000000;
  var deltas=[];
  for(var i=1;i<=7;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+S.user.email+':'+ds);
    if(!diary)continue;
    var ms=diary.meals&&diary.meals[meal];
    var sn=diary.snacks&&diary.snacks[meal];
    if(ms&&ms.length&&sn&&sn.length){
      var mealT=getTimeStr(ms[0]).split(':');
      var snackT=getTimeStr(sn[0]).split(':');
      var mMs=parseInt(mealT[0])*60+parseInt(mealT[1]);
      var sMs=parseInt(snackT[0])*60+parseInt(snackT[1]);
      var delta=(sMs-mMs)*60000;
      if(delta>1800000&&delta<21600000)deltas.push(delta); // tussen 30min en 6u
    }
  }
  if(deltas.length>=2){
    var avg=Math.round(deltas.reduce(function(s,v){return s+v;},0)/deltas.length);
    return avg; // gebruik gemiddeld eetpatroon
  }
  return 9000000; // standaard: 2.5 uur
}

function startTimer(k){
  var ms=S.meals[k];if(!ms.length)return;
  var parts=getTimeStr(ms[0]).split(':');
  var fd=new Date();fd.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  // Slimme herinnering: leer uit eetpatroon van laatste 7 dagen
  var smartDelay=getSmartReminderDelay(k);
  fd=new Date(fd.getTime()+smartDelay);
  S.timerFireAt[k]=String(fd.getHours()).padStart(2,'0')+':'+String(fd.getMinutes()).padStart(2,'0');
  S.cds[k]=Math.max(0,Math.round((fd-Date.now())/1000));
  S.timers[k]=true;
  // Store fire time in localStorage so we can recover after app sleep
  if(S.user){
    var snackKey='snack:pending:'+S.user.email+':'+k;
    DB.set(snackKey,{fireAt:fd.getTime(),meal:k,sent:false});
  }
  // Schedule via setTimeout (works when app is active/foreground)
  var msLeft=Math.max(0,fd.getTime()-Date.now());
  clearTimeout(S._snackTimeout&&S._snackTimeout[k]);
  if(!S._snackTimeout)S._snackTimeout={};
  S._snackTimeout[k]=setTimeout(function(){fireSnackPush(k);},msLeft);
  render();
}
function fireSnackPush(k){
  if(!S.user)return;
  var snackKey='snack:pending:'+S.user.email+':'+k;
  var pending=DB.get(snackKey);
  if(!pending||pending.sent)return;
  pending.sent=true;DB.set(snackKey,pending);
  var mealLabel=k==='morning'?'ontbijt':k==='lunch'?'middagmaal':'avondmaal';
  var title='Be Fit Marke';
  var msg='\uD83C\uDF4E Tijd voor een tussendoortje na je '+mealLabel+'!';
  // Local notification
  if(Notification.permission==='granted')localNotif(title,msg,'snack-'+k);
  // Push via Vercel (works even if app was in background)
  var sub=DB.get('push:sub:'+S.user.email);
  if(sub&&typeof sendPushToClient==='function')sendPushToClient(sub,title,msg,'snack-'+k);
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);
  showNotif(msg);
  S.timers[k]=false;S.cds[k]=0;render();
}
function checkMissedSnackPushes(){
  // Called on app resume - send any overdue snack pushes
  if(!S.user)return;
  ['morning','lunch','evening'].forEach(function(k){
    var pending=DB.get('snack:pending:'+S.user.email+':'+k);
    if(pending&&!pending.sent&&Date.now()>=pending.fireAt){
      fireSnackPush(k);
    }
  });
}

async function runMealPhotoAnalyse(k,input){
  var file=input.files&&input.files[0];if(!file)return;
  var mealName={morning:'Ontbijt',lunch:'Middagmaal',evening:'Avondmaal'}[k]||k;
  showToast('\uD83E\uDD16 Maaltijd analyseren...');
  var reader=new FileReader();
  reader.onload=async function(e){
    var base64=e.target.result.split(',')[1];var mediaType=file.type||'image/jpeg';
    try{
      var apiKey=getApiKey();
      // API-sleutel is nu server-side via Vercel — niet meer nodig in browser
      var resp=await callClaude({model:'claude-sonnet-4-20250514',max_tokens:600,
          system:'Je bent een voedingsdeskundige. Analyseer de foto en geef JSON: {"items":["item1","item2"]}. Enkel JSON, geen uitleg.',
          messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:base64}},{type:'text',text:'Welke voedingsmiddelen zie je?'}]}]});
      var data=await resp.json();
      var txt=data.content&&data.content[0]&&data.content[0].text||'';
      var parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      var items=parsed.items||[];
      if(!items.length){showToast('\u274C Geen voeding herkend');return;}
      if(!S.meals[k])S.meals[k]=[];
      items.forEach(function(item){S.meals[k].push({t:item,ts:Date.now()});});
      saveUserData();
      savePhotoToArchive(e.target.result, items.join(', '), k, getMealDate());
      render();
      showToast('\u2713 '+items.length+' items toegevoegd aan '+mealName);
    }catch(err){
      // Bij fout toch de foto opslaan in archief
      savePhotoToArchive(e.target.result, '', k, getMealDate());
      showToast('\u274C Analyse mislukt, foto wel bewaard: '+err.message);
      render();
    }
  };
  reader.readAsDataURL(file);
}

function _startZxingScan(onResult){
  var status = document.getElementById('bc-status');
  var video = document.getElementById('bc-video');
  if(!video)return;
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'}},audio:false
  }).then(function(stream){
    _scanStream=stream;
    video.srcObject=stream;
    video.play();
    if(status)status.textContent='Richt op barcode...';
    _tryDecode(video,onResult);
  }).catch(function(err){
    if(status)status.textContent='❌ Camera: '+err.message;
  });
}

function _tryDecode(video,onResult){
  if(!document.getElementById('barcode-modal'))return;
  if(!('BarcodeDetector' in window)){
    var s=document.getElementById('bc-status');
    if(s)s.textContent='Automatisch scannen niet beschikbaar — gebruik het invoerveld hierboven.';
    return;
  }
  var det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
  var scan=function(){
    if(!document.getElementById('barcode-modal'))return;
    det.detect(video).then(function(codes){
      if(codes&&codes.length>0){onResult(codes[0].rawValue);}
      else{requestAnimationFrame(scan);}
    }).catch(function(){requestAnimationFrame(scan);});
  };
  requestAnimationFrame(scan);
}

async function sendPushToClient(subscription, title, body, tag){
  var backendUrl='https://befit-backend-teal.vercel.app';
  var resp;
  try{
    resp=await fetch(backendUrl+'/api/send-push',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subscription:subscription,title:title,body:body,tag:tag||'befit'})
    });
  }catch(netErr){
    throw new Error('CORS/netwerk fout. Vercel send-push.js moet CORS headers bevatten. Update api/send-push.js op GitHub en redeploy Vercel.');
  }
  if(!resp.ok){
    var errText='';
    try{var j=await resp.json();errText=j.error||resp.status+'';}catch(x){errText=resp.status+'';}
    if(resp.status===410||resp.status===404){
      if(S.user)DB.del('push:sub:'+S.user.email);
      throw new Error('Abonnement verlopen. Klant moet app opnieuw openen.');
    }
    if(resp.status===500&&errText.includes('VAPID_PRIVATE_KEY')){
      throw new Error('VAPID_PRIVATE_KEY niet ingesteld in Vercel environment variables!');
    }
    throw new Error(errText||resp.status+'');
  }
  return resp;
}

function saveSession(){
  if(S.user) localStorage.setItem('befit_session', JSON.stringify({
    user: S.user, tab: S.tab, mealDate: S.mealDate||null,
    loginAt: Date.now()  // verlooptijd: 30 dagen
  }));
}
function restoreSession(){
  try{
    var sess = localStorage.getItem('befit_session');
    if(sess){
      var obj = JSON.parse(sess);
      if(obj.user && obj.user.email){
        // Sessie vervalt na 30 dagen
        var MAX_AGE = 30 * 24 * 60 * 60 * 1000;
        if(obj.loginAt && (Date.now() - obj.loginAt) > MAX_AGE){
          localStorage.removeItem('befit_session');
          return false;
        }
        S.user = obj.user;
        S.tab = obj.tab || 'morning';
        if(obj.mealDate) S.mealDate = obj.mealDate;
        S.screen = 'app';
        loadUserData();
        startReminderCheck();
        startDiarySync(S.user.email);

      }
    }
  }catch(e){}
  return false;
}

function sendTestPush(email,i){

      }
    }).catch(function(e){

      else{if(btn){btn.textContent='\uD83D\uDD14 Test push';btn.disabled=false;}showToast('\u274C Firestore fout: '+e.message);}
    });
    return;
  }
  var sub=DB.get('push:sub:'+email);
  if(!sub){showToast('\u274C Geen push-abonnement gevonden.');return;}
  _doSendTestPush(sub,email,btn);

function checkDailyReminderPush(){
  if(!S.user||S.user.isAdmin)return;
  var email=S.user.email;
  var reminderKey='daily:reminder:sent:'+email+':'+today();
  if(DB.get(reminderKey))return; // already sent today
  // Check if user has filled in NOTHING today
  var diaryToday=DB.get('diary:'+email+':'+today());
  var hasToday=diaryToday&&diaryToday.meals&&
    (((diaryToday.meals.morning||[]).length)+((diaryToday.meals.lunch||[]).length)+((diaryToday.meals.evening||[]).length))>0;
  if(hasToday)return; // already filled in today, no reminder needed
  // Check if it's after 19:00 local time
  var now=new Date();
  if(now.getHours()<19)return; // too early, schedule for 19:00
  // Send push reminder
  var sub=DB.get('push:sub:'+email);
  if(sub&&typeof sendPushToClient==='function'){
    DB.set(reminderKey,1);
    sendPushToClient(sub,'Be Fit Marke \uD83C\uDF3F',
      'Je hebt vandaag nog niets ingevuld. Even je maaltijden bijhouden?','daily-reminder');
  }
}
function scheduleDailyReminder(){
  if(!S.user||S.user.isAdmin)return;
  // Schedule check at 19:00 today
  var now=new Date();
  var target=new Date();target.setHours(19,0,0,0);
  if(target<=now)target.setDate(target.getDate()+1); // tomorrow if past 19:00
  var msUntil=target.getTime()-now.getTime();
  clearTimeout(S._dailyReminderTimeout);
  S._dailyReminderTimeout=setTimeout(function(){
    checkDailyReminderPush();
    scheduleDailyReminder(); // reschedule for next day
  },msUntil);
  // Also check immediately if past 19:00
  if(now.getHours()>=19)checkDailyReminderPush();
}
