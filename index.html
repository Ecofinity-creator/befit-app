.login-logo-area{text-align:center;margin-bottom:24px;}
.login-tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#A8D4B8;margin-top:6px;letter-spacing:.5px;}
.login-box{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.login-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1E3D20;margin-bottom:6px;}
.login-sub{font-size:12px;color:#9E9580;margin-bottom:18px;line-height:1.6;}
.field-lbl{font-size:11px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;margin-top:12px;}
.field-in{width:100%;border:1px solid #DDD4C0;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Lato',sans-serif;color:#1E3D20;background:#FDFAF5;outline:none;transition:border-color .2s;}
.field-in:focus{border-color:#4A8E7B;}
.btn-primary{width:100%;margin-top:18px;background:#1E3D20;color:#F0EAD6;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;}
.err-box{color:#C0392B;font-size:12px;background:#FFF0F0;border-radius:8px;padding:8px 12px;display:none;margin-top:8px;}
.err-box.show{display:block;}
.ok-box{color:#2A6030;font-size:12px;background:#F0FFF4;border-radius:8px;padding:8px 12px;display:none;margin-top:8px;}
.ok-box.show{display:block;}
.register-link{color:#A8D4B8;font-size:12px;margin-top:14px;text-align:center;}
.register-link a{color:#C9B97A;font-weight:700;cursor:pointer;text-decoration:underline;}
.reg-back{font-size:12px;color:#4A8E7B;cursor:pointer;display:block;margin-bottom:14px;}
.app-header{background:rgba(20,50,22,0.92);backdrop-filter:blur(6px);padding:10px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;overflow:hidden;}
.header-user{font-size:11px;color:#A8D4B8;text-align:right;line-height:1.6;}
.header-user strong{display:block;color:#F0EAD6;font-size:12px;}
.btn-logout{font-size:10px;color:#C9B97A;cursor:pointer;font-weight:700;background:none;border:none;font-family:'Lato',sans-serif;padding:0;}
.diary-title-bar{background:rgba(20,50,22,0.7);border-bottom:1px solid rgba(255,255,255,0.07);}
.diary-title{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#C9B97A;}
.notif-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:#1E3D20;color:#F0EAD6;padding:12px 16px;font-size:13px;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto;}

.toast.show{opacity:1;}
.nav{display:flex;background:#fff;border-top:1px solid #E8E0D0;position:sticky;bottom:0;z-index:100;overflow-x:auto;}
.nav-bar::-webkit-scrollbar{display:none;}

.nav-item .nav-label{font-size:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-top:2px;opacity:0.6;transition:opacity .15s;}
.nav-item.on .nav-label{opacity:1;}
.nav-item.on{color:#1E3D20;}
.nav-item.on .nav-pill{background:#EAF4EE;border-radius:12px;padding:3px 8px;}
.nav-pill{display:flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:12px;transition:background .15s;}
.nav-icon{font-size:20px;display:block;line-height:1;}
.content{background:var(--bg-cream);padding:14px;padding-bottom:80px;}
.card{background:#FFFFFF;border-radius:14px;padding:16px 16px 22px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.10);overflow:hidden;}

.card-head{background:linear-gradient(135deg,#1E3D20,#2A6030);display:flex;align-items:center;gap:10px;padding:12px 16px;margin:-16px -16px 16px;border-radius:14px 14px 0 0;}
.card-icon-box{font-size:20px;background:rgba(255,255,255,0.15);border-radius:8px;padding:5px 7px;line-height:1;}
.card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#FFFFFF!important;flex:1;letter-spacing:.3px;}
.card-body{padding:14px 16px;}



.cbadge{font-size:10px;background:#E8F4EE;color:#2A6030;border-radius:10px;padding:2px 8px;font-weight:700;}
.logged-item{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#FDFAF5;border-radius:9px;margin-bottom:6px;}
.li-text{flex:1;font-size:13px;color:#2C3E28;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-time-wrap{display:flex;align-items:center;gap:3px;}
.li-time-icon{font-size:11px;color:#9E9580;}
.li-time-edit{font-size:12px;color:#4A8E7B;font-weight:700;border:1px solid #D0EAD8;border-radius:6px;padding:4px 4px;background:#F8FFF8;font-family:'Lato',sans-serif;cursor:pointer;width:64px;min-width:64px;text-align:center;}
.li-time-edit:focus{border-color:#4A8E7B;background:#f0faf7;outline:none;}
.li-del{font-size:16px;color:#C0392B;cursor:pointer;padding:0 4px;line-height:1;}
.input-row{display:flex;gap:6px;align-items:center;margin-top:10px;}
.add-time{border:1px solid #DDD4C0;border-radius:8px;padding:8px 6px;font-size:12px;font-family:'Lato',sans-serif;color:#4A8E7B;background:#FDFAF5;width:80px;outline:none;}
.txt-in{flex:1;border:1px solid #DDD4C0;border-radius:8px;padding:9px 10px;font-size:13px;font-family:'Lato',sans-serif;color:#1E3D20;background:#FDFAF5;outline:none;}
.btn-g{background:#1E3D20;color:#F0EAD6;border:none;border-radius:8px;padding:9px 14px;font-size:18px;cursor:pointer;font-weight:700;flex-shrink:0;}
.btn-gold{background:#C9A84C;}
.empty{font-size:12px;color:#C5BC9E;font-style:italic;text-align:center;padding:10px 0;}
.timer-strip{display:flex;align-items:center;gap:8px;background:#F0FFF4;border-radius:9px;padding:8px 12px;margin-top:10px;font-size:12px;}
.ts-txt{flex:1;color:#2A6030;}

.countdown{font-weight:700;color:#2A6030;font-size:14px;}
.snack-card{background:#FFFCF0;border:1px solid #EDE0A0;border-radius:14px;padding:14px;margin-top:4px;margin-bottom:14px;}
.snack-tag{font-size:11px;font-weight:700;color:#C9A84C;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
.water-head{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:#1E3D20;margin-bottom:4px;}
.water-sub{font-size:11px;color:#9E9580;margin-bottom:16px;}
.glass-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.glass-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.glass{width:28px;height:38px;border:2px solid #93C5E4;border-radius:4px 4px 6px 6px;overflow:hidden;background:#EEF7FD;position:relative;}
.glass-fill{position:absolute;bottom:0;left:0;right:0;background:#3A8FBD;transition:height .3s;}
.glass-lbl{font-size:9px;color:#3A8FBD;font-weight:700;margin-top:3px;}
.water-progress{height:8px;background:#E0EFF7;border-radius:4px;margin-bottom:8px;overflow:hidden;}
.water-bar{height:100%;background:linear-gradient(90deg,#3A8FBD,#6BB8D4);border-radius:4px;transition:width .4s;}
.water-num{font-size:13px;font-weight:700;color:#1E3D20;margin-bottom:4px;}
.water-msg{font-size:12px;color:#5A7A8A;font-style:italic;}

.congrats h3{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:4px;}
.congrats p{font-size:11px;opacity:.85;}
.sum-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#1E3D20;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #EAE2D0;}
.sum-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F5F0E6;}
.sum-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.sum-lbl{font-size:11px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.sum-val{font-size:13px;color:#2C3E28;line-height:1.7;}
.appt-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5F0E6;}
.appt-time{font-size:12px;font-weight:700;color:#4A8E7B;min-width:45px;}
.appt-desc{flex:1;font-size:13px;color:#2C3E28;}
.chat-messages{height:280px;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;background:#FDFAF5;}
.chat-bubble{max-width:82%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.chat-bubble.client{background:#E8F4EE;color:#1E3D20;align-self:flex-end;border-bottom-right-radius:4px;}
.chat-bubble.admin{background:#fff;border:1px solid #EAE2D0;color:#2C3E28;align-self:flex-start;border-bottom-left-radius:4px;}
.cb-name{font-size:10px;font-weight:700;color:#4A8E7B;margin-bottom:3px;}
.cb-time{font-size:10px;color:#9E9580;display:block;margin-top:4px;}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #EAE2D0;background:#fff;}
.chat-input-row input{flex:1;border:1px solid #DDD4C0;border-radius:20px;padding:9px 14px;font-size:13px;font-family:'Lato',sans-serif;outline:none;background:#FDFAF5;}
.chat-input-row button{background:#1E3D20;color:#F0EAD6;border:none;border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;flex-shrink:0;}
.chat-empty{text-align:center;color:#9E9580;font-size:12px;font-style:italic;padding:30px 10px;}
.admin-bar{background:#1E3D20;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.admin-client-card{background:#fff;border-radius:12px;margin-bottom:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;}
.admin-client-detail{display:none;}
.admin-client-detail.open{display:block;margin-top:12px;border-top:1px solid #F0EAD6;padding-top:12px;}
.admin-chat-wrap{border:1px solid #EAE2D0;border-radius:10px;overflow:hidden;}
.admin-chat-msgs{height:200px;overflow-y:auto;padding:10px;background:#FDFAF5;display:flex;flex-direction:column;gap:6px;}
.admin-chat-input{display:flex;gap:6px;padding:8px;background:#fff;border-top:1px solid #EAE2D0;}
.admin-chat-input input{flex:1;border:1px solid #DDD4C0;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Lato',sans-serif;outline:none;}
.admin-chat-input button{background:#1E3D20;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}

/* ── RESPONSIVE LAYOUT ──────────────────────────────────────── */
/* Mobile: default (up to 480px) — already optimised */

/* Tablet (481px – 900px) */
@media (min-width: 481px) {
  body { max-width: 640px; }
  .content { padding: 16px 18px 90px; }
  .card-title { font-size: 16px; }
  .txt-in, .field-in { font-size: 14px; }
  .app-header { padding: 12px 20px; }
}

/* Desktop / groot scherm (901px+) */
@media (min-width: 901px) {
  body { max-width: 860px; }
  .content { padding: 20px 24px 100px; }
  .card { padding: 22px 22px 28px; }
  .card-head { margin: -22px -22px 18px; padding: 14px 22px; }
  .card-title { font-size: 17px; }
  .txt-in, .field-in { font-size: 14px; padding: 12px 16px; }
  .app-header { padding: 14px 24px; }
  .diary-title-bar { padding: 8px 20px; }
  .nav { justify-content: center; }
  .nav-item { min-width: 64px; }
}

@media (min-width: 1200px) {
  body { max-width: 1040px; }
  .content { padding: 24px 30px 100px; }
}

</style>

async function syncAllFromFirestore(){
  try{
    var snap=await fsdb.collection('data').get();
    var count=0;
    snap.forEach(function(doc){
      try{
        var k=fromFsKey(doc.id);
        if(doc.data()&&doc.data().v){
          localStorage.setItem(k,doc.data().v);
          count++;
        }
      }catch(e){console.warn('Error storing doc',doc.id,e);}
    });
    console.log('Synced',count,'of',snap.size,'docs from Firestore');
  }catch(e){
    console.warn('syncAllFromFirestore failed:',e.message);
    // Fallback: try to get just user docs with a prefix query
    try{
      var userSnap=await fsdb.collection('data')
        .orderBy('__name__')
        .startAt('user__at__')
        .endAt('user__at__\uf8ff')
        .get();
      userSnap.forEach(function(doc){
        try{if(doc.data()&&doc.data().v)localStorage.setItem(fromFsKey(doc.id),doc.data().v);}catch(e){}
      });
      console.log('Fallback synced',userSnap.size,'user docs');
    }catch(e2){console.warn('Fallback also failed:',e2.message);}
  }
}

function renderAnalyseResult(data){
  var macros=[
    {label:'Kcal',val:data.kcal,unit:'kcal',color:'#C9A84C',icon:'&#x1F525;'},
    {label:'Prote\u00efnen',val:data.proteinen,unit:'g',color:'#2A6030',icon:'&#x1F4AA;'},
    {label:'Koolhydraten',val:data.koolhydraten,unit:'g',color:'#3A8FBD',icon:'&#x1F33E;'},
    {label:'Vetten',val:data.vetten,unit:'g',color:'#C0392B',icon:'&#x1F9C8;'},
    {label:'Vezels',val:data.vezels,unit:'g',color:'#4A8E7B',icon:'&#x1F343;'},
    {label:'Suikers',val:data.suikers,unit:'g',color:'#E67E22',icon:'&#x1F36C;'},
  ];
  var macroGrid=macros.map(function(m){
    return '<div style="text-align:center;padding:10px 6px;background:#FDFAF5;border-radius:10px;border:1px solid #EAE2D0;">'
      +'<div style="font-size:18px;margin-bottom:4px;">'+m.icon+'</div>'
      +'<div style="font-size:16px;font-weight:800;color:'+m.color+';">'+m.val+'</div>'
      +'<div style="font-size:10px;color:#9E9580;">'+m.unit+'</div>'
      +'<div style="font-size:9px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;">'+m.label+'</div>'
      +'</div>';
  }).join('');

  var scoreColor=data.score>=8?'#2A6030':data.score>=5?'#C9A84C':'#C0392B';
  var scoreLabel=data.score>=8?'Uitstekend!':data.score>=6?'Goed':data.score>=4?'Matig':'Te verbeteren';

  var html='<div style="border-top:1px solid #EAE2D0;padding-top:14px;">'
    // Detected dishes from photo
    +(data.fromPhoto&&data.gerechten&&data.gerechten.length
      ?'<div style="background:#EAF4F2;border-radius:10px;padding:10px 12px;margin-bottom:12px;">'
      +'<div style="font-size:10px;font-weight:700;color:#2A6030;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">&#x1F4F7; Herkende gerechten</div>'
      +data.gerechten.map(function(g){return '<div style="font-size:12px;color:#1E3D20;padding:2px 0;">&#x2022; '+g+'</div>';}).join('')
      +'</div>':'')
    // Score
    +'<div style="display:flex;align-items:center;gap:12px;background:#F0F7F2;border-radius:12px;padding:12px 16px;margin-bottom:14px;">'
    +'<div style="text-align:center;">'
    +'<div style="font-size:32px;font-weight:800;color:'+scoreColor+';">'+data.score+'</div>'
    +'<div style="font-size:9px;font-weight:700;color:#5A7A5C;text-transform:uppercase;">/10</div>'
    +'</div>'
    +'<div><div style="font-size:15px;font-weight:700;color:'+scoreColor+';">'+scoreLabel+'</div>'
    +'<div style="font-size:12px;color:#5A7A5C;margin-top:2px;">'+data.scoreUitleg+'</div>'
    +'</div></div>'
    // Macro grid
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">'+macroGrid+'</div>'
    // Tips
    +(data.tips&&data.tips.length?
      '<div style="background:#FFFBEF;border-radius:10px;padding:12px;margin-bottom:10px;">'
      +'<div style="font-size:11px;font-weight:700;color:#856404;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">&#x1F4A1; Tips van de AI</div>'
      +data.tips.map(function(t){
        return '<div style="font-size:12px;color:#5A5020;padding:4px 0;border-bottom:1px solid #F5EED5;">&#x2022; '+t+'</div>';
      }).join('')
      +'</div>':'')
    // Disclaimer
    +'<div style="font-size:10px;color:#9E9580;text-align:center;font-style:italic;padding-top:6px;">'
    +'Analyse is een schatting op basis van de omschrijving. Raadpleeg je di\u00ebtiste voor persoonlijk advies.'
    +'</div>'
    +'</div>';
  return html;
}

async function runPhotoAnalyse(input){
  var file=input.files&&input.files[0];
  if(!file){return;}
  // Read as base64
  var reader=new FileReader();
  reader.onload=async function(e){
    var dataUrl=e.target.result;
    var base64=dataUrl.split(',')[1];
    var mediaType=file.type||'image/jpeg';
    S.photoPreview=dataUrl;
    S.analyseLoading=true;
    render();
    try{
      var selDate=getSummaryDate();
      var resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':getApiKey()},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:600,
          system:'Je bent een voedingsdeskundige assistent. Analyseer maaltijdfoto\'s nauwkeurig. Antwoord altijd in het Nederlands en enkel in het gevraagde JSON-formaat.',
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Analyseer deze maaltijdfoto en geef een schatting van de voedingswaarden. '
              +'Identificeer alle zichtbare voedingsmiddelen en bereken de totale voedingswaarden. '
              +'Antwoord ENKEL in dit JSON-formaat:\n'
              +'{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"korte uitleg","gerechten":["gerecht1","gerecht2"],"tips":["tip1","tip2","tip3"]}'}
          ]}]
        })
      });
      var data=await resp.json();
      var text=data.content[0].text.replace(/```json|```/g,'').trim();
      var result=JSON.parse(text);
      result.fromPhoto=true;
      DB.set('analyse:'+S.user.email+':'+selDate,result);
      savePhotoToArchive(dataUrl,result.samenvatting||'',S.tab,selDate);
    }catch(err){
      showToast('Foto-analyse mislukt. Probeer opnieuw.');
      S.photoPreview=null;
    }
    S.analyseLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}

function generateWeekReport(){
  var lines=[],totalKcal=0,totalWater=0,totalMov=0,days=0;
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+S.user.email+':'+ds);
    if(!diary)continue;
    days++;
    totalWater+=diary.water||0;
    var acts=(diary.activities||[]).reduce(function(s,a){return s+a.dur;},0);
    totalMov+=acts;
    var dayKcal=0;
    ['morning','lunch','evening'].forEach(function(k){
      var anl=DB.get(getMealAnalyseKey(S.user.email,ds,k));
      if(anl&&anl.kcal)dayKcal+=anl.kcal;
    });
    totalKcal+=dayKcal;
    var dLabel=d.toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'});
    var mealCount=['morning','lunch','evening'].reduce(function(s,k){return s+(diary.meals&&diary.meals[k]?diary.meals[k].length:0);},0);
    lines.push(dLabel+': '+mealCount+' maaltijditems, '+Math.round(diary.water||0)+' gl water'+(acts?' , '+acts+' min beweging':'')+(dayKcal?' , '+dayKcal+' kcal':''));
  }
  var goals=getGoals(S.user.email);
  var avgKcal=days?Math.round(totalKcal/days):0;
  var avgWater=days?Math.round(totalWater/days*10)/10:0;
  var avgMov=days?Math.round(totalMov/days):0;
  var body='Beste '+S.user.name+',%0D%0A%0D%0AHier is je weekoverzicht van Be Fit Marke:%0D%0A%0D%0A';
  body+='GEMIDDELDEN DEZE WEEK%0D%0A';
  if(avgKcal)body+='\uD83D\uDD25 Calorieën: '+avgKcal+' kcal/dag'+(goals.kcal?' (doel: '+goals.kcal+')':'')+'%0D%0A';
  body+='\uD83D\uDCA7 Water: '+avgWater+' glazen/dag'+(goals.water?' (doel: '+goals.water+')':'')+'%0D%0A';
  body+='\uD83C\uDFC3 Beweging: '+avgMov+' min/dag'+(goals.movement?' (doel: '+goals.movement+')':'')+'%0D%0A%0D%0A';
  body+='DAGDETAILS%0D%0A'+lines.join('%0D%0A')+'%0D%0A%0D%0A';
  body+='Ga zo door! Tot volgende week.%0D%0ABe Fit Marke';
  var subject=encodeURIComponent('Jouw weekoverzicht Be Fit Marke');
  window.open('mailto:'+S.user.email+'?subject='+subject+'&body='+body,'_blank');
  showToast('\u2713 E-mailclient geopend');
}

function resetUserAccess(){

  var pass=document.getElementById('reset-pass').value;
  if(!email||!pass){showToast('\u274C Vul e-mail en wachtwoord in');return;}
  if(pass.length<6){showToast('\u274C Min. 6 tekens');return;}
  // Try admin first
  var isAdmin=!!findAdmin(email);
  if(isAdmin){
    DB.set('adminpass:'+email,pass);
    showToast('\u2713 Admin wachtwoord gereset voor '+email);
    return;
  }
  // Try client
  var ud=DB.get('user:'+email);
  if(ud){
    ud.pass=btoa(pass);
    DB.set('user:'+email,ud);
    showToast('\u2713 Klant wachtwoord gereset voor '+email);
    return;
  }
  // Not found locally - try Firestore
  fsdb.collection('data').doc(fsKey('user:'+email)).get().then(function(snap){
    if(snap.exists){
      var ud2=JSON.parse(snap.data().v);
      ud2.pass=btoa(pass);
      DB.set('user:'+email,ud2);
      showToast('\u2713 Wachtwoord gereset voor '+email);
    } else {
      showToast('\u274C Gebruiker niet gevonden: '+email);
    }
  }).catch(function(){showToast('\u274C Fout bij opzoeken');});
}

// ── STREAKS ──────────────────────────────────────────────────
function getStreak(email){
  var e=email||S.user.email,streak=0,d=new Date();
  for(var i=0;i<365;i++){
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var diary=DB.get('diary:'+e+':'+ds);
    var ok=diary&&diary.meals&&(['morning','lunch','evening'].some(function(k){return diary.meals[k]&&diary.meals[k].length>0;}));
    if(ok){streak++;}else if(i>0){break;}
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getLongestStreak(email){
  var e=email||S.user.email,best=0,current=0,prev=null;
  var dates=DB.keys().filter(function(k){return k.startsWith('diary:'+e+':');})
    .map(function(k){return k.replace('diary:'+e+':','');})
    .filter(function(d){return /^\d{4}-\d{2}-\d{2}$/.test(d);}).sort();
  dates.forEach(function(ds){
    var diary=DB.get('diary:'+e+':'+ds);
    var ok=diary&&diary.meals&&(['morning','lunch','evening'].some(function(k){return diary.meals[k]&&diary.meals[k].length>0;}));
    if(ok){
      if(prev){var p=new Date(prev);p.setDate(p.getDate()+1);current=(p.toISOString().slice(0,10)===ds)?current+1:1;}
      else current=1;
      if(current>best)best=current;
      prev=ds;
    }else{current=0;prev=null;}
  });
  return best;
}

// ── BARCODE SCANNER ──────────────────────────────────────────
function scanBarcode(mealKey){
  if(!('BarcodeDetector' in window)){showToast('\u274C Barcode scanner niet beschikbaar');return;}
  var input=document.createElement('input');input.type='file';input.accept='image/*';input.capture='environment';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    showToast('\uD83D\uDD0D Scannen...');
    createImageBitmap(file).then(function(img){
      return new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128']}).detect(img);
    }).then(function(barcodes){
      if(!barcodes.length){showToast('\u274C Geen barcode gevonden');return;}
      var code=barcodes[0].rawValue;
      showToast('\uD83D\uDCE6 '+code+' opzoeken...');
      return fetch('https://world.openfoodfacts.org/api/v0/product/'+code+'.json')
        .then(function(r){return r.json();})
        .then(function(data){
          if(data.status!==1||!data.product){showToast('\u274C Product niet gevonden');return;}
          var p=data.product,name=p.product_name_nl||p.product_name||'Onbekend';
          var kcal=p.nutriments&&p.nutriments['energy-kcal_100g']?Math.round(p.nutriments['energy-kcal_100g']):'';
          var inp=document.getElementById('meal-in-'+mealKey);
          if(inp){inp.value=name+(kcal?' ('+kcal+' kcal/100g)':'');inp.focus();}
          showToast('\u2713 '+name);
        });
    }).catch(function(err){showToast('\u274C '+err.message);});
  };
  input.click();
}

// ── STAPPENTELLER ─────────────────────────────────────────────
var _stepCount=0,_stepListener=null,_lastAcc=0;
function startStepCounting(){
  if(_stepListener)return;
  if(!window.DeviceMotionEvent){showToast('\u274C Stappenteller niet beschikbaar op dit toestel');return;}
  function go(){
    var threshold=12,lastStep=0;
    _stepListener=function(e){
      var acc=e.accelerationIncludingGravity;if(!acc)return;
      var mag=Math.sqrt(acc.x*acc.x+acc.y*acc.y+acc.z*acc.z),now=Date.now();
      if(Math.abs(mag-_lastAcc)>threshold&&now-lastStep>300){
        _stepCount++;lastStep=now;
        var el=document.getElementById('step-count-display');
        if(el)el.textContent=_stepCount+' stappen';
        DB.set('steps:'+S.user.email+':'+today(),_stepCount);
      }
      _lastAcc=mag;
    };
    window.addEventListener('devicemotion',_stepListener);
    showToast('\uD83D\uDC5F Stappenteller gestart');render();
  }
  if(typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(function(r){if(r==='granted')go();else showToast('\u274C Toestemming geweigerd');}).catch(go);
  }else go();
}
function stopStepCounting(){if(_stepListener){window.removeEventListener('devicemotion',_stepListener);_stepListener=null;}render();}
function getTodaySteps(){return DB.get('steps:'+S.user.email+':'+today())||0;}
function stepsBlock(){
  var steps=getTodaySteps()||_stepCount,goal=7500,pct=Math.min(100,Math.round(steps/goal*100)),active=!!_stepListener;
  return '<div class="card"><div class="card-head"><div class="card-icon-box">\uD83D\uDC5F</div><span class="card-title">Stappenteller vandaag</span></div>'
    +'<div style="text-align:center;padding:8px 0 12px;">'
    +'<div id="step-count-display" style="font-size:40px;font-weight:800;color:#2A6030;font-family:Playfair Display,serif;">'+steps+'</div>'
    +'<div style="font-size:11px;color:#9E9580;margin-bottom:10px;">stappen \u2014 doel: '+goal.toLocaleString()+'</div>'
    +'<div style="height:10px;background:#EAE2D0;border-radius:10px;margin:0 10px 12px;overflow:hidden;">'
    +'<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#2A6030,#4A8E7B);border-radius:10px;"></div></div>'
    +(active
      ?'<button onclick="stopStepCounting()" style="background:#C0392B;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">\u23F9 Stop</button>'
      :'<button onclick="startStepCounting()" style="background:#2A6030;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">\uD83D\uDC5F Start teller</button>')
    +'</div>'
    +'<div style="font-size:10px;color:#9E9580;text-align:center;font-style:italic;padding-bottom:8px;">Werkt op smartphones via bewegingssensor. Houd de app open.</div>'
    +'</div>';
}

// ── WEBRTC VIDEO BELLEN ───────────────────────────────────────
var _pc=null,_localStream=null,_callActive=false,_callRole=null,_callEmail=null;
var STUN={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

function isVideoEnabled(email){var ud=DB.get('user:'+(email||S.user.email));return ud&&ud.videoEnabled===true;}
function toggleVideo(email){var ud=DB.get('user:'+email);if(!ud)return;ud.videoEnabled=!ud.videoEnabled;DB.set('user:'+email,ud);showToast(ud.videoEnabled?'Video bellen ingeschakeld':'Video bellen uitgeschakeld');loadAdminClients();render();}

function _vcKey(email){return 'videocall:'+email;}

async function startCall(clientEmail){
  // Admin starts a call to a client
  _callRole='caller';_callEmail=clientEmail;
  try{
    _localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    _pc=new RTCPeerConnection(STUN);
    _localStream.getTracks().forEach(function(t){_pc.addTrack(t,_localStream);});
    _pc.ontrack=function(e){var rv=document.getElementById('vc-remote');if(rv&&e.streams[0])rv.srcObject=e.streams[0];};
    _pc.onicecandidate=function(e){
      if(e.candidate){
        var key=_vcKey(clientEmail)+':caller_ice';
        var list=JSON.parse(localStorage.getItem(key)||'[]');
        list.push(e.candidate.toJSON());
        fsdb.collection('data').doc(fsKey(key)).set({v:JSON.stringify(list)}).catch(function(){});
      }
    };
    var offer=await _pc.createOffer();
    await _pc.setLocalDescription(offer);
    await fsdb.collection('data').doc(fsKey(_vcKey(clientEmail))).set({v:JSON.stringify({status:'calling',offer:offer,caller:S.user.email,ts:Date.now()})});
    _callActive=true;
    render();
    // Push notification to client
    var sub=DB.get('push:sub:'+clientEmail);
    if(sub)sendPushToClient(sub,'📹 Videogesprek','Je diëtiste wil je bellen. Open de app!','video');
    // Listen for answer
    var unsub=fsdb.collection('data').doc(fsKey(_vcKey(clientEmail))).onSnapshot(async function(snap){
      if(!snap.exists||!_pc)return;
      var data=JSON.parse(snap.data().v);
      if(data.status==='answered'&&data.answer&&_pc.signalingState==='have-local-offer'){
        await _pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        unsub();
      }
      if(data.status==='ended'){endCall();unsub();}
    });
    // Listen for client ICE candidates
    var unsubIce=fsdb.collection('data').doc(fsKey(_vcKey(clientEmail)+':callee_ice')).onSnapshot(async function(snap){
      if(!snap.exists||!_pc||!_pc.remoteDescription)return;
      var candidates=JSON.parse(snap.data().v||'[]');
      for(var i=0;i<candidates.length;i++){try{await _pc.addIceCandidate(new RTCIceCandidate(candidates[i]));}catch(e){}}
    });
  }catch(err){showToast('❌ Camera/microfoon fout: '+err.message);endCall();}
}

async function answerCall(){
  // Client answers the call
  _callRole='callee';
  try{
    var snap=await fsdb.collection('data').doc(fsKey(_vcKey(S.user.email))).get();
    if(!snap.exists)return;
    var data=JSON.parse(snap.data().v);
    if(data.status!=='calling')return;
    _callEmail=data.caller;
    _localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    _pc=new RTCPeerConnection(STUN);
    _localStream.getTracks().forEach(function(t){_pc.addTrack(t,_localStream);});
    _pc.ontrack=function(e){var rv=document.getElementById('vc-remote');if(rv&&e.streams[0])rv.srcObject=e.streams[0];};
    _pc.onicecandidate=function(e){
      if(e.candidate){
        var key=_vcKey(S.user.email)+':callee_ice';
        var list=JSON.parse(localStorage.getItem(key)||'[]');
        list.push(e.candidate.toJSON());
        fsdb.collection('data').doc(fsKey(key)).set({v:JSON.stringify(list)}).catch(function(){});
      }
    };
    await _pc.setRemoteDescription(new RTCSessionDescription(data.offer));
    var answer=await _pc.createAnswer();
    await _pc.setLocalDescription(answer);
    await fsdb.collection('data').doc(fsKey(_vcKey(S.user.email))).set({v:JSON.stringify({status:'answered',answer:answer,ts:Date.now()})});
    _callActive=true;
    render();
    setTimeout(function(){var lv=document.getElementById('vc-local');if(lv&&_localStream)lv.srcObject=_localStream;},100);
    // Listen for caller ICE candidates
    fsdb.collection('data').doc(fsKey(_vcKey(S.user.email)+':caller_ice')).onSnapshot(async function(snap){
      if(!snap.exists||!_pc||!_pc.remoteDescription)return;
      var candidates=JSON.parse(snap.data().v||'[]');
      for(var i=0;i<candidates.length;i++){try{await _pc.addIceCandidate(new RTCIceCandidate(candidates[i]));}catch(e){}}
    });
    // Listen for call end
    fsdb.collection('data').doc(fsKey(_vcKey(S.user.email))).onSnapshot(function(snap){
      if(!snap.exists)return;
      var d=JSON.parse(snap.data().v);
      if(d.status==='ended')endCall();
    });
  }catch(err){showToast('❌ Fout: '+err.message);endCall();}
}

function declineCall(){S.incomingCall=null;if(S.user)fsdb.collection('data').doc(fsKey('videocall:'+S.user.email)).set({v:JSON.stringify({status:'declined'})}).catch(function(){});render();}
function endCall(){
  if(_pc){_pc.close();_pc=null;}
  if(_localStream){_localStream.getTracks().forEach(function(t){t.stop();});_localStream=null;}
  if(_callEmail&&_callRole==='caller'){
    fsdb.collection('data').doc(fsKey(_vcKey(_callEmail))).set({v:JSON.stringify({status:'ended',ts:Date.now()})}).catch(function(){});
  }
  _callActive=false;_callRole=null;_callEmail=null;
  render();
}

var _barcodeStream=null;
function closeBarcodeScanner(){
  if(_barcodeStream){_barcodeStream.getTracks().forEach(function(t){t.stop();});_barcodeStream=null;}
  var el=document.getElementById('barcode-modal');if(el)el.remove();

async function openBarcodeScanner(mealKey){
  var modal=document.createElement('div');
  modal.id='barcode-modal';
  modal.innerHTML='<div style="position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">'
    +'<div style="color:#F0EAD6;font-size:15px;font-weight:700;margin-bottom:12px;">\uD83D\uDCF7 Barcode scannen</div>'
    +'<div style="position:relative;width:100%;max-width:360px;">'
    +'<video id="barcode-video" autoplay playsinline style="width:100%;border-radius:12px;background:#000;max-height:260px;object-fit:cover;"></video>'
    +'<div style="position:absolute;inset:15%;border:2px solid #C9A84C;border-radius:8px;pointer-events:none;"></div>'
    +'</div>'
    +'<div id="barcode-status" style="color:#A8D4B8;font-size:12px;margin-top:12px;text-align:center;max-width:320px;">Camera wordt gestart\u2026</div>'
    +'<button onclick="closeBarcodeScanner()" style="margin-top:16px;background:#C0392B;color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">\u2715 Sluiten</button>'
    +'</div>';
  document.body.appendChild(modal);
  try{
    _barcodeStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    var video=document.getElementById('barcode-video');
    video.srcObject=_barcodeStream;await video.play();
    var sEl=document.getElementById('barcode-status');
    if('BarcodeDetector' in window){
      var det=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39']});
      var scanning=true;if(sEl)sEl.textContent='Richt de camera op de barcode\u2026';
      (async function scan(){
        if(!scanning||!document.getElementById('barcode-modal'))return;
        try{var bc=await det.detect(video);
          if(bc.length>0){scanning=false;await fetchProductByBarcode(bc[0].rawValue,mealKey);}
          else setTimeout(scan,250);
        }catch(e){setTimeout(scan,350);}
      })();
    }else{
      if(sEl)sEl.innerHTML='<div>Geen scanner beschikbaar.</div>'
        +'<input id="manual-bc" type="text" placeholder="Voer barcode in" style="padding:8px;border-radius:8px;border:1px solid #4A8E7B;font-size:14px;width:220px;text-align:center;color:#1E3D20;margin:8px 0;"/>'
        +'<button onclick="var v=document.getElementById(\'manual-bc\').value.trim();if(v)fetchProductByBarcode(v,\''+mealKey+'\');" style="display:block;background:#2A6030;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;">Zoeken</button>';
    }
  }catch(e){var s=document.getElementById('barcode-status');if(s)s.textContent='\u274C Camera fout: '+e.message;}
}
async function fetchProductByBarcode(barcode,mealKey){
  var s=document.getElementById('barcode-status');
  try{
    if(s)s.textContent='\u23F3 Product ophalen\u2026';
    var resp=await fetch('https://world.openfoodfacts.org/api/v0/product/'+barcode+'.json');
    var data=await resp.json();
    if(data.status===1&&data.product){
      var p=data.product;
      var name=(p.product_name_nl||p.product_name||p.generic_name||'Onbekend').trim();
      var brand=p.brands?(' \u2014 '+p.brands.split(',')[0].trim()):'';
      var n=p.nutriments||{};
      var kcal=n['energy-kcal_100g']?Math.round(n['energy-kcal_100g']):null;
      var fullName=name+brand;
      closeBarcodeScanner();
      setTimeout(function(){
        var inp=document.getElementById('meal-in-'+mealKey);
        if(inp){inp.value=fullName;inp.focus();}
        showToast('\u2713 '+name+(kcal?' \u2014 '+kcal+' kcal/100g':''));
      },150);
    }else{
      if(s)s.textContent='\u274C Niet gevonden. Probeer opnieuw.';
      setTimeout(function(){if(document.getElementById('barcode-modal'))openBarcodeScanner(mealKey);},2000);
    }
  }catch(e){if(s)s.textContent='\u274C Fout: '+e.message;}
}

  var tabContent=tab==='morning'?mealBlock('morning'):tab==='lunch'?mealBlock('lunch'):tab==='evening'?mealBlock('evening'):tab==='water'?waterBlock():tab==='gevoel'?wellbeingBlock():tab==='weight'?weightBlock():tab==='appt'?apptBlock():tab==='chat'?chatBlock():tab==='video'?videoBlock():tab==='news'?newsBlock():tab==='profile'?profileBlock():tab==='analyse'?analyseBlock():tab==='photos'?photoArchiveBlock():tab==='badges'?badgesBlock():tab==='progress'?progressPhotosBlock():tab==='templates'?templateBlock():tab==='steps'?stepsBlock():summaryBlock();
  var unreadChat=getChat(S.user.email).filter(function(m){return m.from==='admin'&&!m.read;}).length;
  var unreadNews=unreadBroadcastCount(S.user.email);
  function navItem(id,icon,label,active,badge){
    return '<div class="nav-item '+(active?'on':'')+'" onclick="S.tab=\''+id+'\';render()" style="position:relative">'
      +'<div class="nav-pill"><span class="nav-icon">'+icon+'</span></div>'
      +'<span class="nav-label">'+label+'</span>'
      +(badge?'<span style="position:absolute;top:2px;right:6px;background:#C0392B;color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;">'+badge+'</span>':'')
      +'</div>';
  }
  app.innerHTML='<div class="app-header" style="display:flex;align-items:center;gap:10px;">'
    +logoSVG(180)
    +'<div class="header-user" style="margin-left:auto;"><strong>'+S.user.name+'</strong>'+D.getDate()+' '+months[D.getMonth()]+' '+D.getFullYear()+'<button class="btn-logout" onclick="logout()">Uitloggen</button></div>'
    +'</div>'
    +(function(){var md=getMealDate(),isToday=md===today();var dObj=new Date(md+'T00:00:00');var dLbl=dObj.toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'});return '<div class="diary-title-bar" style="display:flex;align-items:center;padding:5px 12px;gap:6px;">'+'<button onclick="var d=new Date(getMealDate()+\'T00:00:00\');d.setDate(d.getDate()-1);setMealDate(d.getFullYear()+\'-\'+String(d.getMonth()+1).padStart(2,\'0\')+\'-\'+String(d.getDate()).padStart(2,\'0\'));" style="background:rgba(255,255,255,0.15);color:#C9B97A;border:none;border-radius:6px;padding:3px 10px;font-size:16px;cursor:pointer;line-height:1;">&#x276E;</button>'+'<div style="flex:1;text-align:center;">'+'<div class="diary-title" style="font-size:11px;margin:0;">'+dLbl+'</div>'+(isToday?'<div style="font-size:9px;color:#C9B97A;font-weight:700;">Vandaag</div>':'')+'</div>'+'<button onclick="var d=new Date(getMealDate()+\'T00:00:00\');d.setDate(d.getDate()+1);var nd=d.getFullYear()+\'-\'+String(d.getMonth()+1).padStart(2,\'0\')+\'-\'+String(d.getDate()).padStart(2,\'0\');if(nd<=today())setMealDate(nd);" '+(isToday?'disabled style="color:rgba(255,255,255,0.2);background:transparent;border:none;':'style="background:rgba(255,255,255,0.15);color:#C9B97A;border:none;')+'border-radius:6px;padding:3px 10px;font-size:16px;cursor:pointer;line-height:1;">&#x276F;</button>'+'</div>';})()
    +'<div class="nav">'
    +navItem('morning','🌅','Ontbijt',tab==='morning',0)
    +navItem('lunch','☀️','Middag',tab==='lunch',0)
    +navItem('evening','🌙','Avond',tab==='evening',0)
    +navItem('water','💧','Water',tab==='water',0)
    +navItem('gevoel','🌟','Gevoel',tab==='gevoel',0)
    +navItem('analyse','🔬','Analyse',tab==='analyse',0)
    +navItem('weight','⚖️','Gewicht',tab==='weight',0)
    +navItem('appt','📅','Agenda',tab==='appt',0)
    +navItem('profile','👤','Profiel',tab==='profile',0)
    +navItem('chat','💬','Chat',tab==='chat',unreadChat||0)
    +(isVideoEnabled()?navItem('video','🎥','Video',tab==='video',0):'')
    +navItem('news','📢','Nieuws',tab==='news',unreadNews||0)
    +navItem('summary','📋','Dag',tab==='summary',0)
    +(isAnalyseEnabled()?navItem('photos','📷','Archief',tab==='photos',0):'')
    +navItem('badges','🏅','Badges',tab==='badges',0)
    +navItem('progress','📸',"Foto's",tab==='progress',0)
    +navItem('templates','⭐','Sjablonen',tab==='templates',0)
    +navItem('steps','👟','Stappen',tab==='steps',0)
    +'</div>'
    +'<div class="content">'+tabContent+'<div style="text-align:center;padding:18px 0 6px;font-size:9px;color:rgba(255,255,255,0.55);letter-spacing:.6px;background:rgba(0,0,0,0.15);padding:10px;border-radius:8px;">'
    +'Powered by <span style="font-weight:700;color:rgba(255,255,255,0.8);font-style:italic;">Verdify</span> &mdash; &copy; '+new Date().getFullYear()+'</div>'
    +'</div>'
    +'<button id="dark-toggle-btn" class="dark-toggle" onclick="toggleDarkMode()" title="Donkere modus">'
    +(isDarkMode()?'☀️':'🌙')+'</button>';
  // Video call overlay
  if(_callActive){var _vc=document.createElement('div');_vc.innerHTML=videoCallUI();document.body.appendChild(_vc.firstChild);setTimeout(function(){var lv=document.getElementById('vc-local');if(lv&&_localStream)lv.srcObject=_localStream;var rv=document.getElementById('vc-remote');if(rv&&_pc){_pc.ontrack=function(e){if(rv&&e.streams[0])rv.srcObject=e.streams[0];};}},50);}
  // Incoming call banner
  if(S.incomingCall&&!_callActive){var _icb=document.createElement('div');_icb.innerHTML=incomingCallBanner();if(_icb.firstChild)document.body.appendChild(_icb.firstChild);}
  setTimeout(function(){var el=document.getElementById('chat-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
  // Onboarding overlay
  var _obDiv=document.getElementById('onboarding-overlay');
  if(_obDiv)_obDiv.remove();
  if(S.screen==='app'&&!isOnboardingDone()){var _ob=document.createElement('div');_ob.id='onboarding-overlay';_ob.innerHTML=onboardingOverlay();document.body.appendChild(_ob);}
}

render();
</script>
</body>
</html>
