<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Be Fit – Mijn persoonlijk eetdagboekje</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1E3D20"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Be Fit"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:linear-gradient(160deg,#1E3D20 0%,#2A6030 60%,#4A8E7B 100%);background-attachment:fixed;color:#2C3E28;max-width:480px;margin:0 auto;min-height:100vh;}
#app{min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;background:linear-gradient(160deg,#1E3D20 0%,#2A6030 60%,#4A8E7B 100%);}
.login-logo-area{text-align:center;margin-bottom:24px;}
.login-tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#A8D4B8;margin-top:6px;letter-spacing:.5px;}
.login-box{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.login-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1E3D20;margin-bottom:6px;}
.login-sub{font-size:12px;color:#9E9580;margin-bottom:18px;line-height:1.6;}
.field-lbl{font-size:11px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;margin-top:12px;}
.field-in{width:100%;border:1px solid #DDD4C0;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Lato',sans-serif;color:#1E3D20;background:#FDFAF5;outline:none;transition:border-color .2s;}
.field-in:focus{border-color:#4A8E7B;}
.btn-primary{width:100%;margin-top:18px;background:#1E3D20;color:#F0EAD6;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;}
.err-box{color:#C0392B;font-size:12px;background:#FFF0F0;border-radius:8px;padding:8px 12px;display:none;margin-top:8px;}
.err-box.show{display:block;}
.ok-box{color:#2A6030;font-size:12px;background:#F0FFF4;border-radius:8px;padding:8px 12px;display:none;margin-top:8px;}
.ok-box.show{display:block;}
.register-link{color:#A8D4B8;font-size:12px;margin-top:14px;text-align:center;}
.register-link a{color:#C9B97A;font-weight:700;cursor:pointer;text-decoration:underline;}
.reg-back{font-size:12px;color:#4A8E7B;cursor:pointer;display:block;margin-bottom:14px;}
.app-header{background:rgba(20,50,22,0.92);backdrop-filter:blur(6px);padding:10px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;overflow:hidden;}
.header-user{font-size:11px;color:#A8D4B8;text-align:right;line-height:1.6;}
.header-user strong{display:block;color:#F0EAD6;font-size:12px;}
.btn-logout{font-size:10px;color:#C9B97A;cursor:pointer;font-weight:700;background:none;border:none;font-family:'Lato',sans-serif;padding:0;}
.diary-title-bar{background:rgba(20,50,22,0.7);border-bottom:1px solid rgba(255,255,255,0.07);}
.diary-title{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#C9B97A;}
.notif-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:#1E3D20;color:#F0EAD6;padding:12px 16px;font-size:13px;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1E3D20;color:#F0EAD6;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
.nav{display:flex;background:#fff;border-top:1px solid #E8E0D0;position:sticky;bottom:0;z-index:100;overflow-x:auto;}
.nav-bar::-webkit-scrollbar{display:none;}
.nav-item{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;padding:8px 6px 6px;font-size:0;color:#9E9580;cursor:pointer;position:relative;white-space:nowrap;transition:color .15s;}
.nav-item .nav-label{font-size:8px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-top:2px;opacity:0.6;transition:opacity .15s;}
.nav-item.on .nav-label{opacity:1;}
.nav-item.on{color:#1E3D20;}
.nav-item.on .nav-pill{background:#EAF4EE;border-radius:12px;padding:3px 8px;}
.nav-pill{display:flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:12px;transition:background .15s;}
.nav-icon{font-size:20px;display:block;line-height:1;}
.content{padding:14px;padding-bottom:80px;}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.card-icon-box{font-size:22px;}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#1E3D20;flex:1;}
.cbadge{font-size:10px;background:#E8F4EE;color:#2A6030;border-radius:10px;padding:2px 8px;font-weight:700;}
.logged-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#FDFAF5;border-radius:9px;margin-bottom:6px;}
.li-text{flex:1;font-size:13px;color:#2C3E28;}
.li-time-wrap{display:flex;align-items:center;gap:3px;}
.li-time-icon{font-size:11px;color:#9E9580;}
.li-time-edit{font-size:11px;color:#4A8E7B;font-weight:700;border:1px solid transparent;border-radius:6px;padding:3px 5px;background:transparent;font-family:'Lato',sans-serif;cursor:pointer;width:58px;text-align:center;}
.li-time-edit:focus{border-color:#4A8E7B;background:#f0faf7;outline:none;}
.li-del{font-size:16px;color:#C0392B;cursor:pointer;padding:0 4px;line-height:1;}
.input-row{display:flex;gap:6px;align-items:center;margin-top:10px;}
.add-time{border:1px solid #DDD4C0;border-radius:8px;padding:8px 6px;font-size:12px;font-family:'Lato',sans-serif;color:#4A8E7B;background:#FDFAF5;width:80px;outline:none;}
.txt-in{flex:1;border:1px solid #DDD4C0;border-radius:8px;padding:9px 10px;font-size:13px;font-family:'Lato',sans-serif;color:#1E3D20;background:#FDFAF5;outline:none;}
.btn-g{background:#1E3D20;color:#F0EAD6;border:none;border-radius:8px;padding:9px 14px;font-size:18px;cursor:pointer;font-weight:700;flex-shrink:0;}
.btn-gold{background:#C9A84C;}
.empty{font-size:12px;color:#C5BC9E;font-style:italic;text-align:center;padding:10px 0;}
.timer-strip{display:flex;align-items:center;gap:8px;background:#F0FFF4;border-radius:9px;padding:8px 12px;margin-top:10px;font-size:12px;}
.ts-txt{flex:1;color:#2A6030;}

.countdown{font-weight:700;color:#2A6030;font-size:14px;}
.snack-card{background:#FFFCF0;border:1px solid #EDE0A0;border-radius:14px;padding:14px;margin-top:4px;margin-bottom:14px;}
.snack-tag{font-size:11px;font-weight:700;color:#C9A84C;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
.water-head{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:#1E3D20;margin-bottom:4px;}
.water-sub{font-size:11px;color:#9E9580;margin-bottom:16px;}
.glass-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.glass-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.glass{width:28px;height:38px;border:2px solid #93C5E4;border-radius:4px 4px 6px 6px;overflow:hidden;background:#EEF7FD;position:relative;}
.glass-fill{position:absolute;bottom:0;left:0;right:0;background:#3A8FBD;transition:height .3s;}
.glass-lbl{font-size:9px;color:#3A8FBD;font-weight:700;margin-top:3px;}
.water-progress{height:8px;background:#E0EFF7;border-radius:4px;margin-bottom:8px;overflow:hidden;}
.water-bar{height:100%;background:linear-gradient(90deg,#3A8FBD,#6BB8D4);border-radius:4px;transition:width .4s;}
.water-num{font-size:13px;font-weight:700;color:#1E3D20;margin-bottom:4px;}
.water-msg{font-size:12px;color:#5A7A8A;font-style:italic;}
.congrats{background:linear-gradient(135deg,#1E3D20,#2A6030);color:#F0EAD6;border-radius:14px;padding:16px;margin-bottom:14px;text-align:center;}
.congrats h3{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:4px;}
.congrats p{font-size:11px;opacity:.85;}
.sum-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#1E3D20;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #EAE2D0;}
.sum-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F5F0E6;}
.sum-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.sum-lbl{font-size:11px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.sum-val{font-size:13px;color:#2C3E28;line-height:1.7;}
.appt-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5F0E6;}
.appt-time{font-size:12px;font-weight:700;color:#4A8E7B;min-width:45px;}
.appt-desc{flex:1;font-size:13px;color:#2C3E28;}
.chat-messages{height:280px;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;background:#FDFAF5;}
.chat-bubble{max-width:82%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.chat-bubble.client{background:#E8F4EE;color:#1E3D20;align-self:flex-end;border-bottom-right-radius:4px;}
.chat-bubble.admin{background:#fff;border:1px solid #EAE2D0;color:#2C3E28;align-self:flex-start;border-bottom-left-radius:4px;}
.cb-name{font-size:10px;font-weight:700;color:#4A8E7B;margin-bottom:3px;}
.cb-time{font-size:10px;color:#9E9580;display:block;margin-top:4px;}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid #EAE2D0;background:#fff;}
.chat-input-row input{flex:1;border:1px solid #DDD4C0;border-radius:20px;padding:9px 14px;font-size:13px;font-family:'Lato',sans-serif;outline:none;background:#FDFAF5;}
.chat-input-row button{background:#1E3D20;color:#F0EAD6;border:none;border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;flex-shrink:0;}
.chat-empty{text-align:center;color:#9E9580;font-size:12px;font-style:italic;padding:30px 10px;}
.admin-bar{background:#1E3D20;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.admin-client-card{background:#fff;border-radius:12px;margin-bottom:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;}
.admin-client-detail{display:none;}
.admin-client-detail.open{display:block;margin-top:12px;border-top:1px solid #F0EAD6;padding-top:12px;}
.admin-chat-wrap{border:1px solid #EAE2D0;border-radius:10px;overflow:hidden;}
.admin-chat-msgs{height:200px;overflow-y:auto;padding:10px;background:#FDFAF5;display:flex;flex-direction:column;gap:6px;}
.admin-chat-input{display:flex;gap:6px;padding:8px;background:#fff;border-top:1px solid #EAE2D0;}
.admin-chat-input input{flex:1;border:1px solid #DDD4C0;border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Lato',sans-serif;outline:none;}
.admin-chat-input button{background:#1E3D20;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;}
</style>
</head>

function checkSessionTimeout(){
  if(!S.user||S.user.isAdmin)return false;
  var last=parseInt(localStorage.getItem('befit:lastActivity')||'0');
  if(last&&Date.now()-last>SESSION_TIMEOUT){
    fsauth.signOut().catch(function(){});

function fsKey(k){return k.replace(/\./g,"__dot__").replace(/@/g,"__at__").replace(/:/g,"__col__");}
function fromFsKey(k){return k.replace(/__dot__/g,".").replace(/__at__/g,"@").replace(/__col__/g,":");}
const DB={get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}fsdb.collection("data").doc(fsKey(k)).set({v:JSON.stringify(v),t:Date.now()}).then(function(){}).catch(function(e){console.warn("Firestore write failed for",k,":",e.message);});},del:function(k){localStorage.removeItem(k);fsdb.collection("data").doc(fsKey(k)).delete().catch(function(){});},keys:function(){return Object.keys(localStorage);}};
async function syncFromFirestore(email){
  var keys=["user:"+email,"chat:"+email,"broadcast:messages","broadcast:read:"+email,"weights:"+email,"push:sub:"+email,"push:backend:url","anthropic:apikey","extra:admins","analyse_day:"+email+":"+today(),"goals:"+email,"measurements:"+email];
  for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()-i);var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");keys.push("diary:"+email+":"+ds,"feedback:"+email+":"+ds,"wellbeing:"+email+":"+ds);["morning","lunch","evening"].forEach(function(k){keys.push("analyse:"+email+":"+ds+":"+k);});}
  await Promise.all(keys.map(async function(k){try{var snap=await fsdb.collection("data").doc(fsKey(k)).get();if(snap.exists)localStorage.setItem(k,snap.data().v);}catch(e){}}));
}
async function syncAllFromFirestore(){
  try{
    var snap=await fsdb.collection('data').get();
    var count=0;
    snap.forEach(function(doc){
      try{
        var k=fromFsKey(doc.id);
        if(doc.data()&&doc.data().v){
          localStorage.setItem(k,doc.data().v);
          count++;
        }
      }catch(e){console.warn('Error storing doc',doc.id,e);}
    });
    console.log('Synced',count,'of',snap.size,'docs from Firestore');
  }catch(e){
    console.warn('syncAllFromFirestore failed:',e.message);
    // Fallback: try to get just user docs with a prefix query
    try{
      var userSnap=await fsdb.collection('data')
        .orderBy('__name__')
        .startAt('user__at__')
        .endAt('user__at__\uf8ff')
        .get();
      userSnap.forEach(function(doc){
        try{if(doc.data()&&doc.data().v)localStorage.setItem(fromFsKey(doc.id),doc.data().v);}catch(e){}
      });
      console.log('Fallback synced',userSnap.size,'user docs');
    }catch(e2){console.warn('Fallback also failed:',e2.message);}
  }
}
// Load all user profiles directly from Firestore for admin
async function loadAdminClientsFromFirestore(){
  try{
    // Load user profiles
    var snap=await fsdb.collection('data')
      .orderBy('__name__')
      .startAt(fsKey('user:'))
      .endAt(fsKey('user:\uf8ff'))
      .get();
    snap.forEach(function(doc){
      try{if(doc.data()&&doc.data().v)localStorage.setItem(fromFsKey(doc.id),doc.data().v);}catch(e){}
    });
    console.log('Loaded',snap.size,'user profiles from Firestore');
    // Also load today's diary for each client
    var emails=snap.docs.map(function(doc){return fromFsKey(doc.id).replace('user:','');});
    var diaryPromises=emails.map(function(email){
      var diaryKey='diary:'+email+':'+today();
      return fsdb.collection('data').doc(fsKey(diaryKey)).get()
        .then(function(d){if(d.exists&&d.data().v)localStorage.setItem(diaryKey,d.data().v);})
        .catch(function(){});
    });
    await Promise.all(diaryPromises);
    loadAdminClients();
    render();
  }catch(e){
    console.warn('loadAdminClientsFromFirestore failed:',e.message);
  }
}

function setMealDate(d){
  S.mealDate=d;
  // If going back to today, use live S state (already in sync via listener)
  if(d===today()){loadUserData();render();return;}
  // Load from localStorage first for instant display
  var diary=DB.get('diary:'+S.user.email+':'+d)||{meals:{morning:[],lunch:[],evening:[]},snacks:{morning:[],lunch:[],evening:[]},water:0,reminders:[],activities:[]};
  S.meals=diary.meals||{morning:[],lunch:[],evening:[]};S.snacks=diary.snacks||{morning:[],lunch:[],evening:[]};S.water=diary.water||0;S.activities=diary.activities||[];
  render();
  // Then sync from Firestore — only apply if still on same date
  var _reqDate=d;
  fsdb.collection('data').doc(fsKey('diary:'+S.user.email+':'+d)).get().then(function(snap){
    if(S.mealDate!==_reqDate)return; // user navigated away, ignore
    if(snap.exists){
      var dd=JSON.parse(snap.data().v);
      // Only overwrite if remote is newer than what we might have saved
      var local=DB.get('diary:'+S.user.email+':'+_reqDate)||{};
      if(!local.ts||dd.ts>local.ts){
        S.meals=dd.meals||{morning:[],lunch:[],evening:[]};
        S.snacks=dd.snacks||{morning:[],lunch:[],evening:[]};
        S.water=dd.water||0;S.activities=dd.activities||[];
        localStorage.setItem('diary:'+S.user.email+':'+_reqDate,JSON.stringify(dd));
        render();
      }
    }
  }).catch(function(){});
}

function analyseBlock(){

  var diary=isToday
    ?{meals:S.meals,snacks:S.snacks,activities:S.activities}
    :DB.get('diary:'+S.user.email+':'+selDate)||{meals:{morning:[],lunch:[],evening:[]},snacks:{morning:[],lunch:[],evening:[]},activities:[]};
  var dm=diary.meals||{morning:[],lunch:[],evening:[]};
  var mealNames={morning:'Ontbijt',lunch:'Middagmaal',evening:'Avondmaal'};
  var allItems=[];
  ['morning','lunch','evening'].forEach(function(k){
    var items=dm[k]||[];
    if(items.length) items.forEach(function(i){ allItems.push(mealNames[k]+': '+i.t); });
  });

  // Date nav bar
  var dObj=new Date(selDate+'T00:00:00');
  var dLabel=dObj.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'});
  var navBar='<div style="display:flex;align-items:center;background:rgba(20,50,22,0.7);padding:10px 16px;margin:-14px -14px 16px;border-radius:14px 14px 0 0;gap:8px;">'
    +'<button onclick="summaryPrevDay();S.tab=\'analyse\';" style="background:rgba(255,255,255,0.15);color:#F0EAD6;border:none;border-radius:8px;padding:6px 13px;font-size:18px;cursor:pointer;line-height:1;">&#x276E;</button>'
    +'<div style="flex:1;text-align:center;">'
    +'<div style="font-size:13px;font-weight:700;color:#F0EAD6;text-transform:capitalize;">'+dLabel+'</div>'
    +(isToday?'<div style="font-size:10px;color:#C9B97A;font-weight:700;margin-top:2px;">Vandaag</div>':'')
    +'</div>'
    +'<button onclick="summaryNextDay();S.tab=\'analyse\';" '
    +(isToday?'disabled style="background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);':'style="background:rgba(255,255,255,0.15);color:#F0EAD6;')
    +'border:none;border-radius:8px;padding:6px 13px;font-size:18px;cursor:pointer;line-height:1;">&#x276F;</button>'
    +'</div>';

  // Week averages (always shown)
  var weekData={kcal:[],proteinen:[],koolhydraten:[],vetten:[],vezels:[]};
  for(var wi=6;wi>=0;wi--){
    var wd=new Date();wd.setDate(wd.getDate()-wi);
    var wds=wd.getFullYear()+'-'+String(wd.getMonth()+1).padStart(2,'0')+'-'+String(wd.getDate()).padStart(2,'0');
    var dayKcal=0,dayProt=0,dayKoolh=0,dayVet=0,dayVez=0,hasData=false;
    ['morning','lunch','evening'].forEach(function(mk){
      var anl=DB.get(getMealAnalyseKey(S.user.email,wds,mk));
      if(anl){hasData=true;dayKcal+=anl.kcal||0;dayProt+=anl.proteinen||0;dayKoolh+=anl.koolhydraten||0;dayVet+=anl.vetten||0;dayVez+=anl.vezels||0;}
    });
    if(hasData){weekData.kcal.push(dayKcal);weekData.proteinen.push(dayProt);weekData.koolhydraten.push(dayKoolh);weekData.vetten.push(dayVet);weekData.vezels.push(dayVez);}
  }
  function avg(arr){return arr.length?Math.round(arr.reduce(function(s,v){return s+v;},0)/arr.length):0;}
  var wAvg={kcal:avg(weekData.kcal),proteinen:avg(weekData.proteinen),koolhydraten:avg(weekData.koolhydraten),vetten:avg(weekData.vetten),vezels:avg(weekData.vezels)};
  var goals=getGoals(S.user.email);
  var weekCard=weekData.kcal.length>0
    ?'<div class="card" style="margin-bottom:12px;">'
    +'<div class="card-head"><div class="card-icon-box">&#x1F4C8;</div><span class="card-title">Weekgemiddelden ('+weekData.kcal.length+' dagen)</span></div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;">'
    +[{l:'Kcal',v:wAvg.kcal,u:'kcal',col:'#C9A84C',goal:goals.kcal},{l:'Eiwitten',v:wAvg.proteinen,u:'g',col:'#2A6030',goal:null},{l:'Koolh.',v:wAvg.koolhydraten,u:'g',col:'#3A8FBD',goal:null},{l:'Vetten',v:wAvg.vetten,u:'g',col:'#C0392B',goal:null},{l:'Vezels',v:wAvg.vezels,u:'g',col:'#4A8E7B',goal:null}].map(function(m){
      var pct=m.goal&&m.v?Math.min(100,Math.round(m.v/m.goal*100)):null;
      return '<div style="text-align:center;padding:8px 4px;background:#FDFAF5;border-radius:8px;border:1px solid #EAE2D0;">'
        +'<div style="font-size:14px;font-weight:800;color:'+m.col+';">'+m.v+'</div>'
        +'<div style="font-size:9px;color:#9E9580;">'+m.u+'/dag</div>'
        +'<div style="font-size:8px;font-weight:700;color:#5A7A5C;text-transform:uppercase;">'+m.l+'</div>'
        +(pct!==null?'<div style="height:4px;background:#EAE2D0;border-radius:3px;margin-top:4px;"><div style="height:100%;width:'+pct+'%;background:'+m.col+';border-radius:3px;"></div></div>':'')
        +'</div>';
    }).join('')
    +'</div>'
    +'<button onclick="generateWeekReport()" style="width:100%;background:#F0EAD6;color:#1E3D20;border:1px solid #DDD4C0;border-radius:9px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">&#x2709;&#xFE0F; Stuur weekrapport via e-mail</button>'
    +'</div>'
    :'';

  if(!allItems.length){
    return weekCard+'<div class="card">'+navBar
      +'<div style="text-align:center;padding:32px 16px;">'
      +'<div style="font-size:40px;margin-bottom:12px;">&#x1F966;</div>'
      +'<div style="font-family:\'Playfair Display\',serif;font-size:16px;color:#1E3D20;margin-bottom:8px;">Geen maaltijden ingegeven</div>'
      +'<div style="font-size:13px;color:#9E9580;">Voeg eerst maaltijden toe om een voedingsanalyse te krijgen.</div>'
      +'</div></div>';
  }

  // Access control
  if(!isAnalyseEnabled()){
    return weekCard+'<div class="card"><div style="text-align:center;padding:32px 16px;">'
      +'<div style="font-size:40px;margin-bottom:12px;">&#x1F512;</div>'
      +'<div style="font-family:\'Playfair Display\',serif;font-size:16px;color:#1E3D20;margin-bottom:8px;">Analyse niet beschikbaar</div>'
      +'<div style="font-size:13px;color:#9E9580;">De AI voedingsanalyse is nog niet vrijgeschakeld door je di\u00ebtiste.</div>'
      +'</div></div>';
  }

  // Per-meal analysis cache
  var mealAnalysis={};
  ['morning','lunch','evening'].forEach(function(k){
    mealAnalysis[k]=DB.get(getMealAnalyseKey(S.user.email,selDate,k));
  });

  var mealListHtml=allItems.map(function(it){
    return '<div style="font-size:12px;color:#5A7A5C;padding:3px 0;border-bottom:1px solid #F5F0E6;">&#x2022; '+it+'</div>';
  }).join('');

  // Build results
  var resultHtml='';
  var mealResultsHtml=['morning','lunch','evening'].map(function(k){
    var r=mealAnalysis[k];
    if(!r)return '';
    return '<div style="margin-bottom:12px;">'
      +'<div style="font-size:11px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">'
      +(k==='morning'?'&#x1F315; Ontbijt':k==='lunch'?'&#x2600;&#xFE0F; Middagmaal':'&#x1F319; Avondmaal')
      +'</div>'+renderAnalyseResult(r)+'</div>';
  }).join('');

  if(S.analyseLoading){
    resultHtml='<div style="text-align:center;padding:24px;">'
      +'<div style="font-size:28px;margin-bottom:10px;">&#x1F914;</div>'
      +'<div style="font-size:13px;color:#5A7A5C;font-style:italic;">AI analyseert je voeding...</div>'
      +'</div>';
  } else {
    resultHtml=mealResultsHtml;
  }

  // Per-meal buttons
  var btnHtml='<div style="margin-bottom:14px;">'
    +'<div style="font-size:10px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">Analyseer per maaltijd (1x per maaltijd)</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'
    +(dm.morning&&dm.morning.length
      ?'<button onclick="runMealAnalyse(\'morning\')" '+(mealAnalysis.morning?'style="background:#EAF4EE;color:#2A6030;border:1px solid #A8D4B8;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;" disabled':'style="background:linear-gradient(135deg,#C9A84C,#B8960E);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">&#x1F315; Ontbijt')+(mealAnalysis.morning?' &#x2713; Gedaan':'')+'</button>'
      :'')
    +(dm.lunch&&dm.lunch.length
      ?'<button onclick="runMealAnalyse(\'lunch\')" '+(mealAnalysis.lunch?'style="background:#EAF4EE;color:#2A6030;border:1px solid #A8D4B8;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;" disabled':'style="background:linear-gradient(135deg,#2A6030,#1E3D20);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">&#x2600;&#xFE0F; Middag')+(mealAnalysis.lunch?' &#x2713; Gedaan':'')+'</button>'
      :'')
    +(dm.evening&&dm.evening.length
      ?'<button onclick="runMealAnalyse(\'evening\')" '+(mealAnalysis.evening?'style="background:#EAF4EE;color:#2A6030;border:1px solid #A8D4B8;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;" disabled':'style="background:linear-gradient(135deg,#3A8FBD,#2A6F9D);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">&#x1F319; Avond')+(mealAnalysis.evening?' &#x2713; Gedaan':'')+'</button>'
      :'')
    +'<label style="background:#4A8E7B;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;display:flex;align-items:center;gap:6px;">'
    +'&#x1F4F7; Foto<input type="file" accept="image/*" capture="environment" onchange="runPhotoAnalyse(this)" style="display:none;"/></label>'
    +'</div></div>';

  return weekCard+'<div class="card">'+navBar
    +'<div class="card-head"><div class="card-icon-box">&#x1F4CA;</div><span class="card-title">Voedingsanalyse AI</span></div>'
    +'<div style="background:#F0F7F2;border-radius:10px;padding:12px;margin-bottom:14px;">'
    +'<div style="font-size:10px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">Maaltijden '+selDate+'</div>'
    +mealListHtml
    +'</div>'
    +btnHtml
    +(S.photoPreview?'<div style="margin-bottom:12px;border-radius:10px;overflow:hidden;border:2px solid #4A8E7B;"><img src="'+S.photoPreview+'" style="width:100%;max-height:200px;object-fit:cover;display:block;"/><div style="background:#4A8E7B;color:#fff;font-size:10px;font-weight:700;text-align:center;padding:4px;">&#x1F916; Foto geanalyseerd</div></div>':'')
    +resultHtml
    +'</div>';
}

function renderAnalyseResult(data){
  var macros=[
    {label:'Kcal',val:data.kcal,unit:'kcal',color:'#C9A84C',icon:'&#x1F525;'},
    {label:'Prote\u00efnen',val:data.proteinen,unit:'g',color:'#2A6030',icon:'&#x1F4AA;'},
    {label:'Koolhydraten',val:data.koolhydraten,unit:'g',color:'#3A8FBD',icon:'&#x1F33E;'},
    {label:'Vetten',val:data.vetten,unit:'g',color:'#C0392B',icon:'&#x1F9C8;'},
    {label:'Vezels',val:data.vezels,unit:'g',color:'#4A8E7B',icon:'&#x1F343;'},
    {label:'Suikers',val:data.suikers,unit:'g',color:'#E67E22',icon:'&#x1F36C;'},
  ];
  var macroGrid=macros.map(function(m){
    return '<div style="text-align:center;padding:10px 6px;background:#FDFAF5;border-radius:10px;border:1px solid #EAE2D0;">'
      +'<div style="font-size:18px;margin-bottom:4px;">'+m.icon+'</div>'
      +'<div style="font-size:16px;font-weight:800;color:'+m.color+';">'+m.val+'</div>'
      +'<div style="font-size:10px;color:#9E9580;">'+m.unit+'</div>'
      +'<div style="font-size:9px;font-weight:700;color:#5A7A5C;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;">'+m.label+'</div>'
      +'</div>';
  }).join('');

  var scoreColor=data.score>=8?'#2A6030':data.score>=5?'#C9A84C':'#C0392B';
  var scoreLabel=data.score>=8?'Uitstekend!':data.score>=6?'Goed':data.score>=4?'Matig':'Te verbeteren';

  var html='<div style="border-top:1px solid #EAE2D0;padding-top:14px;">'
    // Detected dishes from photo
    +(data.fromPhoto&&data.gerechten&&data.gerechten.length
      ?'<div style="background:#EAF4F2;border-radius:10px;padding:10px 12px;margin-bottom:12px;">'
      +'<div style="font-size:10px;font-weight:700;color:#2A6030;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">&#x1F4F7; Herkende gerechten</div>'
      +data.gerechten.map(function(g){return '<div style="font-size:12px;color:#1E3D20;padding:2px 0;">&#x2022; '+g+'</div>';}).join('')
      +'</div>':'')
    // Score
    +'<div style="display:flex;align-items:center;gap:12px;background:#F0F7F2;border-radius:12px;padding:12px 16px;margin-bottom:14px;">'
    +'<div style="text-align:center;">'
    +'<div style="font-size:32px;font-weight:800;color:'+scoreColor+';">'+data.score+'</div>'
    +'<div style="font-size:9px;font-weight:700;color:#5A7A5C;text-transform:uppercase;">/10</div>'
    +'</div>'
    +'<div><div style="font-size:15px;font-weight:700;color:'+scoreColor+';">'+scoreLabel+'</div>'
    +'<div style="font-size:12px;color:#5A7A5C;margin-top:2px;">'+data.scoreUitleg+'</div>'
    +'</div></div>'
    // Macro grid
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">'+macroGrid+'</div>'
    // Tips
    +(data.tips&&data.tips.length?
      '<div style="background:#FFFBEF;border-radius:10px;padding:12px;margin-bottom:10px;">'
      +'<div style="font-size:11px;font-weight:700;color:#856404;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">&#x1F4A1; Tips van de AI</div>'
      +data.tips.map(function(t){
        return '<div style="font-size:12px;color:#5A5020;padding:4px 0;border-bottom:1px solid #F5EED5;">&#x2022; '+t+'</div>';
      }).join('')
      +'</div>':'')
    // Disclaimer
    +'<div style="font-size:10px;color:#9E9580;text-align:center;font-style:italic;padding-top:6px;">'
    +'Analyse is een schatting op basis van de omschrijving. Raadpleeg je di\u00ebtiste voor persoonlijk advies.'
    +'</div>'
    +'</div>';
  return html;
}

async function runPhotoAnalyse(input){
  var file=input.files&&input.files[0];
  if(!file){return;}
  // Read as base64
  var reader=new FileReader();
  reader.onload=async function(e){
    var dataUrl=e.target.result;
    var base64=dataUrl.split(',')[1];
    var mediaType=file.type||'image/jpeg';
    S.photoPreview=dataUrl;
    S.analyseLoading=true;
    render();
    try{
      var selDate=getSummaryDate();
      var resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':getApiKey()},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:600,
          system:'Je bent een voedingsdeskundige assistent. Analyseer maaltijdfoto\'s nauwkeurig. Antwoord altijd in het Nederlands en enkel in het gevraagde JSON-formaat.',
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Analyseer deze maaltijdfoto en geef een schatting van de voedingswaarden. '
              +'Identificeer alle zichtbare voedingsmiddelen en bereken de totale voedingswaarden. '
              +'Antwoord ENKEL in dit JSON-formaat:\n'
              +'{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"korte uitleg","gerechten":["gerecht1","gerecht2"],"tips":["tip1","tip2","tip3"]}'}
          ]}]
        })
      });
      var data=await resp.json();
      var text=data.content[0].text.replace(/```json|```/g,'').trim();
      var result=JSON.parse(text);
      result.fromPhoto=true;
      DB.set('analyse:'+S.user.email+':'+selDate,result);
    }catch(err){
      showToast('Foto-analyse mislukt. Probeer opnieuw.');
      S.photoPreview=null;
    }
    S.analyseLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}
async function runAnalyse(){
  var selDate=getSummaryDate(),isToday=selDate===today();
  var diary=isToday
    ?{meals:S.meals,snacks:S.snacks}
    :DB.get('diary:'+S.user.email+':'+selDate)||{meals:{morning:[],lunch:[],evening:[]},snacks:{morning:[],lunch:[],evening:[]}};
  var dm=diary.meals||{morning:[],lunch:[],evening:[]};
  var mealNames={morning:'Ontbijt',lunch:'Middagmaal',evening:'Avondmaal'};
  var allItems=[];
  ['morning','lunch','evening'].forEach(function(k){
    var items=dm[k]||[];
    if(items.length) items.forEach(function(i){ allItems.push(mealNames[k]+': '+i.t); });
  });
  if(!allItems.length){showToast('Geen maaltijden om te analyseren');return;}
  S.analyseLoading=true;render();
  try{
    var prompt='Analyseer deze maaltijden van een persoon die werkt aan een gezonder eetpatroon:\n\n'
      +allItems.join('\n')
      +'\n\nGeef een schatting van de voedingswaarden voor de volledige dag en geef ook tips. '
      +'Antwoord ENKEL in dit JSON-formaat, zonder uitleg erbuiten:\n'
      +'{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"korte uitleg","tips":["tip1","tip2","tip3"]}';
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':getApiKey()},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        system:'Je bent een voedingsdeskundige assistent. Antwoord altijd in het Nederlands en enkel in het gevraagde JSON-formaat.',
        messages:[{role:'user',content:prompt}]
      })
    });
    var data=await resp.json();
    var text=data.content[0].text.replace(/```json|```/g,'').trim();
    var result=JSON.parse(text);
    DB.set('analyse:'+S.user.email+':'+selDate,result);
  }catch(e){
    showToast('Analyse mislukt. Probeer opnieuw.');
  }
  S.analyseLoading=false;render();
}
function weightBlock(){
  if(!isWeightEnabled()){
    return '<div class="card" style="text-align:center;padding:40px 20px;">'
      +'<div style="font-size:40px;margin-bottom:12px;">&#x2696;&#xFE0F;</div>'
      +'<div style="font-family:\'Playfair Display\',serif;font-size:16px;color:#1E3D20;margin-bottom:8px;">Gewicht niet beschikbaar</div>'
      +'<div style="font-size:13px;color:#9E9580;">De gewichtsopvolging is nog niet vrijgeschakeld door je di\u00ebtiste.</div>'
      +'</div>';
  }
  var list=getWeights(S.user.email),todayStr=today();
  var existing=list.find(function(w){return w.date===todayStr;});
  var entryCard='<div class="card"><div class="card-head"><div class="card-icon-box">&#x2696;&#xFE0F;</div><span class="card-title">Gewicht opvolgen</span></div><div style="display:flex;gap:8px;margin-bottom:12px;"><div style="flex:1"><div style="font-size:10px;font-weight:700;color:#5A7A5C;text-transform:uppercase;margin-bottom:5px;">Datum</div><input type="date" id="w-date" value="'+todayStr+'" style="width:100%;border:1px solid #DDD4C0;border-radius:9px;padding:9px 11px;font-size:13px;font-family:Lato,sans-serif;color:#1E3D20;background:#FDFAF5;outline:none;"/></div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:#5A7A5C;text-transform:uppercase;margin-bottom:5px;">Gewicht (kg)</div><input type="number" id="w-kg" step="0.1" min="20" max="300" placeholder="bv. 68.5" value="'+(existing?existing.kg:'')+'" style="width:100%;border:1px solid #DDD4C0;border-radius:9px;padding:9px 11px;font-size:16px;font-weight:700;font-family:Lato,sans-serif;color:#1E3D20;background:#FDFAF5;outline:none;text-align:center;"/></div></div><button onclick="var d=document.getElementById(\'w-date\').value,k=parseFloat(document.getElementById(\'w-kg\').value);if(d&&k>0)saveWeight(d,k);else showToast(\'Vul datum en gewicht in\');" style="width:100%;background:#1E3D20;color:#F0EAD6;border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:Lato,sans-serif;">&#x2713; Opslaan</button>'+(existing?'<div style="font-size:11px;color:#4A8E7B;text-align:center;margin-top:8px;">&#x2713; Vandaag: <strong>'+existing.kg+' kg</strong></div>':'')+'</div>';
  if(!list.length)return entryCard+'<div class="card" style="text-align:center;padding:32px 20px;"><div style="font-size:36px;margin-bottom:10px;">&#x2696;&#xFE0F;</div><div style="font-size:15px;color:#1E3D20;">Nog geen metingen</div></div>';
  var first=list[0],last=list[list.length-1],diff=Math.round((last.kg-first.kg)*10)/10;

async function runMealAnalyse(meal){
  if(!getApiKey()){showToast('Geen API-sleutel. Stel in via Instellingen.');return;}
  var selDate=getMealDate(),items=(S.meals[meal]||[]);
  if(!items.length){showToast('Geen items in deze maaltijd');return;}
  var mealNames={morning:'Ontbijt',lunch:'Middagmaal',evening:'Avondmaal'},mealName=mealNames[meal];

  try{
    var prompt='Analyseer deze '+mealName+':\n\n'+items.map(function(i){return '- '+i.t;}).join('\n')+'\n\nAntwoord ENKEL in dit JSON-formaat:\n{"kcal":0,"proteinen":0,"koolhydraten":0,"vetten":0,"vezels":0,"suikers":0,"score":8,"scoreUitleg":"uitleg","tips":["tip1","tip2"]}';
    var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':getApiKey()},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,system:'Je bent een voedingsdeskundige assistent. Antwoord in het Nederlands en enkel in het gevraagde JSON-formaat.',messages:[{role:'user',content:prompt}]})});
    var data=await resp.json();
    if(data.error){showToast('API fout: '+data.error.message);S.analyseLoading=null;render();return;}
    if(!data.content||!data.content[0]){showToast('Ongeldig antwoord');S.analyseLoading=null;render();return;}
    var text=data.content[0].text.replace(/```json|```/g,'').trim();
    var jm=text.match(/\{[\s\S]*\}/);if(!jm){showToast('Onleesbaar antwoord');S.analyseLoading=null;render();return;}
    var result=JSON.parse(jm[0]);result.meal=meal;result.mealName=mealName;result.ts=Date.now();result.byClient=S.user.name;
    DB.set(getMealAnalyseKey(S.user.email,selDate,meal),result);
    // Also save combined daily analyse for easy admin access
    var _allAnl={};
    ['morning','lunch','evening'].forEach(function(_k){
      var _r=DB.get(getMealAnalyseKey(S.user.email,selDate,_k));
      if(_r)_allAnl[_k]=_r;
    });
    _allAnl[meal]=result;
    DB.set('analyse_day:'+S.user.email+':'+selDate,_allAnl);
  }catch(err){showToast('Analyse mislukt: '+(err.message||'fout'));}
  S.analyseLoading=null;render();
}

    days++;

    var acts=(diary.activities||[]).reduce(function(s,a){return s+a.dur;},0);
    totalMov+=acts;
    var dayKcal=0;
    ['morning','lunch','evening'].forEach(function(k){
      var anl=DB.get(getMealAnalyseKey(S.user.email,ds,k));
      if(anl&&anl.kcal)dayKcal+=anl.kcal;
    });
    totalKcal+=dayKcal;
    var dLabel=d.toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'});
    var mealCount=['morning','lunch','evening'].reduce(function(s,k){return s+(diary.meals&&diary.meals[k]?diary.meals[k].length:0);},0);
    lines.push(dLabel+': '+mealCount+' maaltijditems, '+Math.round(diary.water||0)+' gl water'+(acts?' , '+acts+' min beweging':'')+(dayKcal?' , '+dayKcal+' kcal':''));
  }
  var goals=getGoals(S.user.email);
  var avgKcal=days?Math.round(totalKcal/days):0;
  var avgWater=days?Math.round(totalWater/days*10)/10:0;
  var avgMov=days?Math.round(totalMov/days):0;
  var body='Beste '+S.user.name+',%0D%0A%0D%0AHier is je weekoverzicht van Be Fit Marke:%0D%0A%0D%0A';
  body+='GEMIDDELDEN DEZE WEEK%0D%0A';
  if(avgKcal)body+='\uD83D\uDD25 Calorieën: '+avgKcal+' kcal/dag'+(goals.kcal?' (doel: '+goals.kcal+')':'')+'%0D%0A';
  body+='\uD83D\uDCA7 Water: '+avgWater+' glazen/dag'+(goals.water?' (doel: '+goals.water+')':'')+'%0D%0A';
  body+='\uD83C\uDFC3 Beweging: '+avgMov+' min/dag'+(goals.movement?' (doel: '+goals.movement+')':'')+'%0D%0A%0D%0A';
  body+='DAGDETAILS%0D%0A'+lines.join('%0D%0A')+'%0D%0A%0D%0A';
  body+='Ga zo door! Tot volgende week.%0D%0ABe Fit Marke';
  var subject=encodeURIComponent('Jouw weekoverzicht Be Fit Marke');
  window.open('mailto:'+S.user.email+'?subject='+subject+'&body='+body,'_blank');
  showToast('\u2713 E-mailclient geopend');
}

var _adminListener=null;
function startAdminSync(){
  if(_adminListener)_adminListener();
  // Listen for any new user registrations in Firestore
  _adminListener=fsdb.collection('data')
    .orderBy('t','desc').limit(20)
    .onSnapshot(function(snap){
      var hasNewUser=false;
      snap.docChanges().forEach(function(change){
        if(change.type==='added'||change.type==='modified'){
          var key=fromFsKey(change.doc.id);
          if(key.startsWith('user:')&&change.doc.data().v){
            localStorage.setItem(key,change.doc.data().v);
            hasNewUser=true;
          }
        }
      });
      if(hasNewUser&&S.screen==='admin'){loadAdminClients();render();}
    },function(){});
}
function stopAdminSync(){if(_adminListener){_adminListener();_adminListener=null;}}
function changeAdminPassword(){
  var old=document.getElementById('chpw-old').value;
  var n1=document.getElementById('chpw-new1').value;
  var n2=document.getElementById('chpw-new2').value;
  var err=document.getElementById('chpw-err');
  err.style.display='none';
  var currentPass=getAdminPass(S.user.email);
  if(old!==currentPass&&btoa(old)!==currentPass){err.textContent='Huidig wachtwoord klopt niet.';err.style.display='block';return;}
  if(n1.length<6){err.textContent='Nieuw wachtwoord moet min. 6 tekens zijn.';err.style.display='block';return;}
  if(n1!==n2){err.textContent='Wachtwoorden komen niet overeen.';err.style.display='block';return;}
  DB.set('adminpass:'+S.user.email,n1);
  showToast('\u2713 Wachtwoord gewijzigd');
  document.getElementById('chpw-old').value='';
  document.getElementById('chpw-new1').value='';
  document.getElementById('chpw-new2').value='';
}
function resetUserAccess(){
  var email=(document.getElementById('reset-email').value||'').trim().toLowerCase();
  var pass=document.getElementById('reset-pass').value;
  if(!email||!pass){showToast('\u274C Vul e-mail en wachtwoord in');return;}
  if(pass.length<6){showToast('\u274C Min. 6 tekens');return;}
  // Try admin first
  var isAdmin=!!findAdmin(email);
  if(isAdmin){
    DB.set('adminpass:'+email,pass);
    showToast('\u2713 Admin wachtwoord gereset voor '+email);
    return;
  }
  // Try client
  var ud=DB.get('user:'+email);
  if(ud){
    ud.pass=btoa(pass);
    DB.set('user:'+email,ud);
    showToast('\u2713 Klant wachtwoord gereset voor '+email);
    return;
  }
  // Not found locally - try Firestore
  fsdb.collection('data').doc(fsKey('user:'+email)).get().then(function(snap){
    if(snap.exists){
      var ud2=JSON.parse(snap.data().v);
      ud2.pass=btoa(pass);
      DB.set('user:'+email,ud2);
      showToast('\u2713 Wachtwoord gereset voor '+email);
    } else {
      showToast('\u274C Gebruiker niet gevonden: '+email);
    }
  }).catch(function(){showToast('\u274C Fout bij opzoeken');});
}
